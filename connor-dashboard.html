<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Connor Dashboard">

<title>Connor Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --bg:#000;--bg2:#0d0d0d;--bg3:#181818;--bg4:#222;
  --border:#2a2a2a;--border2:#383838;
  --text:#f2f2f2;--g1:#aaa;--g2:#666;--g3:#333;
  --neon:#39ff14;--neon2:#2bc810;--ndim:#0d2200;
  --red:#ff3b3b;--amber:#ffcc00;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 0 0}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.hdr-logo{display:flex;align-items:center;gap:9px}
.hdr-icon{width:32px;height:32px;background:var(--ndim);border:1px solid var(--neon2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:.1em;text-transform:uppercase;color:var(--white)}
.hdr-sub{font-size:9px;color:var(--g2);letter-spacing:.12em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:600}
.hdr-right{text-align:right}
.hdr-lifts{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--neon);letter-spacing:.05em}
.hdr-wt{font-size:10px;color:var(--g2)}

/* NAV */
.nav{display:flex;overflow-x:auto;border-top:1px solid var(--border);scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;background:none;border:none;cursor:pointer;padding:9px 13px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--g2);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.nb.active{color:var(--neon);border-bottom-color:var(--neon)}

/* BODY */
.body{padding:12px;padding-bottom:48px;max-width:860px;margin:0 auto}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:11px}
.card-dark{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}
.ct{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--g2);margin-bottom:12px}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* STAT TILES */
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px 10px}
.sl{font-size:9px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;line-height:1;margin-bottom:2px}
.ss{font-size:10px;color:var(--g2)}

/* MACRO BARS */
.mb{margin-bottom:10px}
.mbh{display:flex;justify-content:space-between;margin-bottom:3px}
.mbl{font-size:10px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.mbv{font-size:11px;font-weight:700;color:var(--text)}
.mbv.over{color:var(--red)}
.mbt{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.mbf{height:100%;border-radius:3px;transition:width .4s ease}

/* MACRO TILES */
.msm{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:12px}
.mt{background:var(--bg3);border-radius:7px;padding:9px 4px;text-align:center}
.mtv{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;margin-bottom:1px}
.mtv.over{color:var(--red)!important}
.mtl{font-size:9px;color:var(--g2)}

/* LIFT BARS */
.lb{margin-bottom:14px}
.lbh{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.lbn{font-size:12px;font-weight:600;color:var(--text)}
.lbv{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:var(--neon)}
.lbt{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:2px}
.lbf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g3),var(--neon));transition:width .4s}
.lbm{font-size:9px;color:var(--g3)}

/* INPUTS */
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:9px 11px;font-size:14px;font-family:'Barlow',sans-serif;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--neon)}
input[type="date"]{color-scheme:dark}
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.ghost-input{position:relative}
.ghost-input input{position:relative;z-index:2;background:transparent}
.ghost-val{position:absolute;top:50%;left:11px;transform:translateY(-50%);font-size:14px;color:var(--g3);z-index:1;pointer-events:none;font-family:'Barlow',sans-serif}

/* BUTTONS */
.btn{display:block;width:100%;border:none;border-radius:7px;padding:11px 14px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-neon{background:var(--neon);color:#000}
.btn-grey{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-outline{background:none;color:var(--neon);border:1px solid var(--neon);border-radius:7px;padding:4px 11px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.08em;cursor:pointer}
.btn-danger{background:none;color:var(--red);border:1px solid #ff3b3b44;font-size:12px;padding:8px}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px;width:auto;display:inline-block}

/* FIELDS */
.field{margin-bottom:10px}
.fl{font-size:9px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;display:block}

/* CHECKS */
.chk{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;user-select:none;transition:background .15s,border-color .15s}
.chk.done{background:var(--ndim);border-color:var(--neon2)}
.chk-box{font-size:17px;flex-shrink:0}
.chk-lbl{font-size:12px;color:var(--g1)}
.chk.done .chk-lbl{color:var(--neon)}

/* MEAL ITEMS */
.mi{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;margin-bottom:5px}
.mi-food{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.mi-meta{font-size:10px;color:var(--g2)}
.mi-del{background:none;border:none;color:var(--red);font-size:19px;cursor:pointer;padding:3px 7px;flex-shrink:0}

/* WEEK STRIP */
.ws{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wd{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 2px;text-align:center;cursor:pointer;transition:border-color .15s}
.wd.today{background:#0a1a00;border-color:var(--neon)}
.wd.selected{border-color:var(--g2)}
.wdn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.07em;color:var(--g2);margin-bottom:3px}
.wd.today .wdn{color:var(--neon)}
.wds{font-size:8px;color:var(--g3);line-height:1.3;margin-bottom:4px}
.wdi{font-size:13px}

/* TAGS */
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase}
.tn{background:var(--ndim);color:var(--neon)}
.tg{background:var(--bg4);color:var(--g1)}
.tr{background:#1a0000;color:var(--red)}
.ta{background:#1a1100;color:var(--amber)}

/* ALERTS */
.alert{padding:9px 13px;border-radius:7px;font-size:11px;margin-bottom:9px;border-left:3px solid}
.alert-a{background:#110e00;border-color:var(--amber);color:var(--amber)}
.alert-n{background:#001a00;border-color:var(--neon);color:var(--neon)}
.alert-r{background:#1a0000;border-color:var(--red);color:var(--red)}

/* SESSION FLOW */
.spips{display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap}
.spip{height:4px;flex:1;border-radius:2px;background:var(--bg4);min-width:8px;transition:background .3s}
.spip.dp{background:var(--neon)}
.spip.cp{background:var(--g2)}

.ex-card{background:var(--bg3);border:1px solid var(--neon2);border-radius:11px;padding:15px;margin-bottom:11px}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;color:var(--white);letter-spacing:.05em;margin-bottom:3px}
.ex-target{font-size:12px;color:var(--neon);font-weight:600;margin-bottom:3px}
.ex-last{font-size:11px;color:var(--g2);margin-bottom:3px}
.ex-cue{font-size:11px;color:var(--g2);margin-bottom:12px;line-height:1.5;font-style:italic}
.ex-sets{margin-bottom:12px}

.set-row{display:flex;gap:6px;align-items:center;margin-bottom:7px}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:var(--g2);width:36px;flex-shrink:0}
.set-done-btn{width:34px;height:34px;border-radius:7px;border:none;cursor:pointer;font-size:15px;flex-shrink:0;transition:background .15s}
.sdb-on{background:var(--neon);color:#000}
.sdb-off{background:var(--bg4);color:var(--g2)}

.ex-nav{display:flex;gap:7px}
.ex-note{margin-top:10px}

/* WARMUP */
.wu-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.wu-item:last-child{border-bottom:none}
.wu-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:var(--neon);min-width:18px}
.wu-text{font-size:12px;color:var(--g1);line-height:1.4}
.wu-note{font-size:10px;color:var(--g2);margin-top:2px}

/* RECIPE */
.rec-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.rec-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.rec-meta{font-size:10px;color:var(--g2)}
.rec-actions{display:flex;gap:6px;flex-shrink:0}

/* WEEK VIEW */
.week-session{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}
.ws-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ws-day{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;color:var(--white)}
.ws-type{font-size:11px;color:var(--g2)}
.ws-lifts{font-size:11px;color:var(--g1)}

/* MISC */
.divider{height:1px;background:var(--border);margin:12px 0}
.empty{text-align:center;padding:20px 0;color:var(--g2);font-size:12px}
.scroll-list{max-height:340px;overflow-y:auto}
.io-row{display:flex;gap:7px}
.io-row .btn{flex:1}
.lift-entry{font-size:11px;color:var(--g2);padding:3px 0;border-bottom:1px solid var(--border)}
.lift-entry:last-child{border-bottom:none}

/* SESSION COMPLETE */
.sess-done{text-align:center;padding:28px 18px}
.sess-done-icon{font-size:48px;margin-bottom:10px}
.sess-done-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--neon);letter-spacing:.08em;margin-bottom:7px}
.sess-done-sub{font-size:13px;color:var(--g1);line-height:1.6}

/* TDEE BAR */
.tdee-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.tdee-lbl{font-size:12px;color:var(--g1)}
.tdee-val{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900}

@media(max-width:480px){
  .g4{grid-template-columns:repeat(2,1fr)}
  .sv{font-size:19px}
  .ws{gap:3px}
  .wds{display:none}
  .msm{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

// ── HELPERS ──────────────────────────────────────────────────────────────────
const today=()=>new Date().toISOString().split('T')[0];
const todayDi=()=>{const d=new Date().getDay();return d===0?6:d-1;};
const dateDi=ds=>{const d=new Date(ds+'T12:00:00').getDay();return d===0?6:d-1;};
const isTrain=di=>WEEKLY[di].type==='gym'||WEEKLY[di].type==='cardio';
const pct=(b,pc)=>Math.round(b*pc/2.5)*2.5;

function dayLog(date){
  if(!S.logs[date])S.logs[date]={meals:[],checks:{}};
  if(!S.logs[date].meals)S.logs[date].meals=[];
  if(!S.logs[date].checks)S.logs[date].checks={};
  return S.logs[date];
}

function allFoods(){
  const r={...BASE_FOODS};
  (S.recipes||[]).forEach(rec=>{r[rec.name]={kcal:rec.portionKcal,p:rec.portionP,c:rec.portionC,f:rec.portionF,isRecipe:true,portions:rec.portions};});
  (S.customFoods||[]).forEach(cf=>{r[cf.name]={kcal:cf.kcal,p:cf.p,c:cf.c,f:cf.f};});
  return r;
}

function sumMeals(meals){
  return meals.reduce((a,m)=>({kcal:a.kcal+(m.kcal||0),p:a.p+(m.p||0),c:a.c+(m.c||0),f:a.f+(m.f||0)}),{kcal:0,p:0,c:0,f:0});
}

function fm(foodName,qty=100){
  const foods=allFoods();const fd=foods[foodName];
  if(!fd)return{kcal:0,p:0,c:0,f:0};
  // Recipes are stored per portion (100%), custom foods per 100g
  if(fd.isRecipe)return{kcal:Math.round(fd.kcal*(qty/100)),p:Math.round(fd.p*(qty/100)),c:Math.round(fd.c*(qty/100)),f:Math.round(fd.f*(qty/100))};
  const m=qty/100;
  return{kcal:Math.round(fd.kcal*m),p:Math.round(fd.p*m),c:Math.round(fd.c*m),f:Math.round(fd.f*m)};
}

function getLastSession(planKey,beforeDate){
  // Find the most recent saved session for this planKey before today
  const dates=Object.keys(S.logs).filter(d=>d<beforeDate).sort().reverse();
  for(const d of dates){
    const sk=d+'_'+planKey;
    if(S.sessState[sk]&&S.sessState[sk].phase==='done')return{date:d,ss:S.sessState[sk]};
  }
  return null;
}

function getLastExSets(planKey,exIdx,beforeDate){
  const last=getLastSession(planKey,beforeDate);
  if(!last)return null;
  return last.ss.sets?.[exIdx]||null;
}

function updateHdr(){
  const p=S.profile;
  const sq=(S.lifts['Back Squat']?.current)||p.squat1rm;
  const bp=(S.lifts['Bench Press']?.current)||p.bench1rm;
  const dl=(S.lifts['Deadlift']?.current)||p.deadlift1rm;
  document.getElementById('hdr-lifts').textContent=`S${sq} / B${bp} / D${dl}`;
  const we=Object.entries(S.logs).filter(([,v])=>v.weight).sort(([a],[b])=>a.localeCompare(b));
  const curW=we.length>0?we[we.length-1][1].weight:p.startWeight;
  document.getElementById('hdr-wt').textContent=`${curW}kg · ${p.block}`;
}

  const p=S.profile;
  const we=Object.entries(S.logs).filter(([,v])=>v.weight).sort(([a],[b])=>a.localeCompare(b));
  const curW=we.length>0?we[we.length-1][1].weight:p.startWeight;
  const wDiff=(curW-p.startWeight).toFixed(1);
  const wSign=parseFloat(wDiff)>0?'+':'';
  let streak=0;const now=new Date();now.setHours(0,0,0,0);
  for(let i=0;i<60;i++){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().split('T')[0];if(S.logs[k]?.checks?.session)streak++;else if(i>0)break;}
  const deficit=td-tot.kcal;
  const wstrip=WEEKLY.map((w,wi)=>{
    const off=wi-di;const d=new Date(now);d.setDate(d.getDate()+off);
    const k=d.toISOString().split('T')[0];const done=S.logs[k]?.checks?.session;
    return `<div class="wd ${wi===di?'today':''}"><div class="wdn">${w.day}</div><div class="wds">${w.session}</div><div class="wdi">${done?'✅':w.type==='rest'?'😴':'⬜'}</div></div>`;

  const bars=[
    {l:'Calories',v:tot.kcal,t:tgts.kcal,c:'#f2f2f2'},
    {l:'Protein', v:tot.p,   t:tgts.protein,c:'#39ff14'},
    {l:'Carbs',   v:tot.c,   t:tgts.carbs,  c:'#888'},
    {l:'Fat',     v:tot.f,   t:tgts.fat,    c:'#555'},
  ].map(({l,v,t,c})=>{const pc=Math.min((v/t)*100,100);const ov=v>t;
    return `<div class="mb"><div class="mbh"><span class="mbl">${l}</span><span class="mbv ${ov?'over':''}">${v}<span style="color:var(--g3)">/${t}</span></span></div><div class="mbt"><div class="mbf" style="width:${pc}%;background:${ov?'var(--red)':c}"></div></div></div>`;
  }).join('');

    {name:'Back Squat',start:p.squat1rm,target:Math.round(p.squat1rm*1.165)},

  if(tot.kcal>tgts.kcal)alerts+=`<div class="alert alert-r">📊 Over calorie target by ${tot.kcal-tgts.kcal}kcal</div>`;
  if(streak>=5)alerts+=`<div class="alert alert-n">🔥 ${streak} session streak — check recovery</div>`;
  return `${alerts}
  <div class="g4" style="margin-bottom:11px">
    <div class="stat"><div class="sl">Today</div><div class="sv" style="color:var(--neon);font-size:14px">${info.session}</div><div class="ss">${dtype==='training'?'Train':'Rest'}</div></div>
    <div class="stat"><div class="sl">Weight</div><div class="sv" style="color:var(--white)">${curW}<span style="font-size:11px">kg</span></div><div class="ss">${wSign}${wDiff}kg</div></div>
    <div class="stat"><div class="sl">Streak</div><div class="sv" style="color:var(--neon)">${streak}</div><div class="ss">sessions</div></div>
    <div class="stat"><div class="sl">Deficit</div><div class="sv" style="color:${deficit>0?'var(--neon)':'var(--red)'};font-size:18px">${deficit>0?deficit:'+'+(Math.abs(deficit))}</div><div class="ss">kcal ${deficit>0?'under':'over'} TDEE</div></div>
  </div>
  <div class="card"><div class="ct">Today's Macros · ${dtype==='training'?'Training':'Rest'} Day</div>${bars}
    <div class="msm">
      ${[{l:'Kcal',v:tot.kcal,t:tgts.kcal,c:'var(--white)'},{l:'Protein',v:tot.p,t:tgts.protein,c:'var(--neon)'},{l:'Carbs',v:tot.c,t:tgts.carbs,c:'var(--g1)'},{l:'Fat',v:tot.f,t:tgts.fat,c:'var(--g2)'}].map(({l,v,t,c})=>`<div class="mt"><div class="mtv ${v>t?'over':''}" style="${v<=t?'color:'+c:''}">${v}</div><div class="mtl">/${t} ${l}</div></div>`).join('')}
    </div>
    <div style="margin-top:10px;padding:8px 11px;background:var(--bg3);border-radius:7px;border:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;font-size:11px">

      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px">
        <span style="color:var(--g2)">Eaten</span><span style="color:var(--g1);font-weight:700">${tot.kcal} kcal</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px">

let sessDate=today();

function renderSession(){
  const di=dateDi(sessDate);const info=WEEKLY[di];
  const plans=getPlans(S.profile);const pk=info.planKey;
  const dateStr=sessDate===today()?'Today':'Date: '+sessDate;
  const datePicker=`<div class="card" style="margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="ct" style="margin-bottom:0;flex:1">${dateStr} · ${info.session}</div>
      <input type="date" id="sess-date-pick" value="${sessDate}" onchange="sessDate=this.value;render()" style="width:auto;flex-shrink:0;font-size:12px;padding:6px 9px">
    </div>
  </div>`;
  if(!pk||!plans[pk]){
    return `${datePicker}<div class="card" style="text-align:center;padding:28px 16px">
      <div style="font-size:38px;margin-bottom:10px">😴</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--g1);margin-bottom:7px">REST DAY</div>
      <div style="font-size:13px;color:var(--g2)">No gym session. Focus on recovery, nutrition, and sleep.</div>
    </div>`;
  }
  const plan=plans[pk];
  const sk=sessDate+'_'+pk;
  if(!S.sessState[sk])S.sessState[sk]={phase:'warmup',exIdx:0,sets:{},notes:{}};
  const ss=S.sessState[sk];
  if(ss.phase==='warmup')return datePicker+renderWarmup(plan,sk);
  if(ss.phase==='main')  return datePicker+renderExercise(plan,sk,pk);
  if(ss.phase==='done')  return datePicker+renderSessDone(plan,sk,pk);

    <div style="font-size:11px;color:var(--g2);margin-bottom:12px">Complete all warm-up exercises before starting main work.</div>
    ${plan.warmup.map((w,i)=>`<div class="wu-item"><div class="wu-num">${i+1}</div><div><div class="wu-text">${w.ex} — <span style="color:var(--g2)">${w.detail}</span></div><div class="wu-note">💬 ${w.cue}</div></div></div>`).join('')}
    <div style="margin-top:14px"><button class="btn btn-neon" onclick="startMain('${sk}')">Warm-Up Done → Start Main Work</button></div>
  </div>`;
}

function renderExercise(plan,sk,pk){
  const ss=S.sessState[sk];
  const exList=plan.exercises;const idx=ss.exIdx;const ex=exList[idx];
  if(!ex){ss.phase='done';saveState();return renderSessDone(plan,sk,pk);}
  const total=exList.length;
  const pips=exList.map((_,i)=>`<div class="spip ${i<idx?'dp':i===idx?'cp':''}"></div>`).join('');
  if(!ss.sets[idx])ss.sets[idx]=Array(ex.sets).fill(null).map(()=>({kg:'',reps:'',done:false}));
  if(!ss.notes[idx])ss.notes[idx]='';

  // Last week's sets for this exercise
  const lastSets=getLastExSets(pk,idx,sessDate);
  const setRows=ss.sets[idx].map((s,si)=>{
    const lastKg=lastSets?.[si]?.kg||'';const lastReps=lastSets?.[si]?.reps||'';
    return `<div class="set-row">
      <div class="set-num">Set ${si+1}</div>
      <div class="ghost-input" style="flex:1">
        ${lastKg?`<div class="ghost-val">${lastKg}</div>`:''}
        <input type="number" placeholder="kg" value="${s.kg}" step="2.5" oninput="setVal('${sk}',${idx},${si},'kg',this.value)" style="max-width:90px">
      </div>
      <div class="ghost-input" style="flex:1">
        ${lastReps?`<div class="ghost-val">${lastReps}</div>`:''}
        <input type="number" placeholder="reps" value="${s.reps}" oninput="setVal('${sk}',${idx},${si},'reps',this.value)" style="max-width:80px">
      </div>
      <button class="set-done-btn ${s.done?'sdb-on':'sdb-off'}" onclick="toggleSetDone('${sk}',${idx},${si})">${s.done?'✅':'○'}</button>
    </div>`;
  }).join('');

  const lastInfo=lastSets?`<div class="ex-last">📅 Last time: ${lastSets.filter(s=>s.done).map(s=>`${s.kg||'?'}kg×${s.reps||'?'}`).join(', ')||'no data'}</div>`:'<div class="ex-last" style="color:var(--g3)">📅 No previous data for this exercise</div>';
  const allDone=ss.sets[idx].every(s=>s.done);
  const isLast=idx===total-1;
  return `<div class="card"><div class="ct">${plan.name} · ${idx+1} of ${total}</div><div class="spips">${pips}</div></div>
  <div class="ex-card">
    <div class="ex-name">${ex.name}</div>
    <div class="ex-target">🎯 ${ex.target} · ${ex.reps} reps · Rest ${ex.rest}</div>
    ${lastInfo}
    <div class="ex-cue">${ex.cue}</div>
    <div class="ex-sets">${setRows}</div>
    <div class="ex-note">
      <input type="text" placeholder="Note (e.g. used DBs — no barbell)" value="${ss.notes[idx]||''}" oninput="setNote('${sk}',${idx},this.value)" style="font-size:12px;padding:7px 10px">
    </div>
    <div class="ex-nav" style="margin-top:10px">
      ${idx>0?`<button class="btn btn-grey btn-sm" style="flex:1" onclick="prevEx('${sk}')">← Back</button>`:''}
      <button class="btn ${allDone?'btn-neon':'btn-grey'} btn-sm" style="flex:2" onclick="nextEx('${sk}','${isLast}')">${isLast?'Finish Session ✓':'Next →'}</button>
    </div>
  </div>`;
}

function renderSessDone(plan,sk,pk){
  const ss=S.sessState[sk];
  let total=0,logged=0;
  Object.values(ss.sets||{}).forEach(sa=>{total+=sa.length;logged+=sa.filter(s=>s.done).length;});
  const dl=dayLog(sessDate);dl.checks.session=true;dl.checks.neck=true;saveState();
  const plans=getPlans(S.profile);const exList=plans[pk]?.exercises||[];
  return `<div class="card"><div class="sess-done">
    <div class="sess-done-icon">💪</div>
    <div class="sess-done-title">Session Complete</div>
    <div class="sess-done-sub">${plan.name}<br>${logged} of ${total} sets logged<br><span style="color:var(--neon)">Marked done ✅</span></div>
  </div></div>
  <div class="card"><div class="ct">What You Logged</div>
    ${Object.entries(ss.sets||{}).map(([exI,sets])=>{
      const ex=exList[parseInt(exI)];if(!ex)return'';
      const note=ss.notes?.[exI];
      return `<div style="margin-bottom:11px">
        <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px">${ex.name}${note?` <span style="color:var(--g2);font-weight:400;font-size:10px">— ${note}</span>`:''}</div>
        ${sets.map((s,si)=>`<div class="lift-entry">Set ${si+1}: ${s.kg?s.kg+'kg':'—'} × ${s.reps||'—'} reps ${s.done?'✅':''}</div>`).join('')}
      </div>`;
    }).join('')}
  </div>
  <div class="card">
    <button class="btn btn-grey" onclick="resetSess('${sk}')">↩ Redo Session</button>
  </div>`;
}

// ── WEEK VIEW ────────────────────────────────────────────────────────────────
function renderWeek(){
  const now=new Date();now.setHours(0,0,0,0);
  const di=todayDi();
  // Start of current week (Mon)
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-di+(weekOffset*7));
  const days=WEEKLY.map((w,wi)=>{
    const d=new Date(weekStart);d.setDate(weekStart.getDate()+wi);
    const ds=d.toISOString().split('T')[0];
    const isToday=ds===today();
    const dl=S.logs[ds]||{};
    const done=dl.checks?.session;
    const tot=sumMeals(dl.meals||[]);
    const pk=w.planKey;
    const sk=pk?ds+'_'+pk:null;
    const ss=sk?S.sessState[sk]:null;
    // Top sets from session
    let sessStr='';
    if(ss&&ss.phase==='done'&&pk){
      const plans=getPlans(S.profile);const exList=plans[pk]?.exercises||[];
      const highlights=Object.entries(ss.sets||{}).slice(0,3).map(([ei,sets])=>{
        const ex=exList[parseInt(ei)];if(!ex)return'';
        const best=sets.filter(s=>s.kg).sort((a,b)=>parseFloat(b.kg)-parseFloat(a.kg))[0];
        return best?`${ex.name.split(' ')[0]} ${best.kg}kg×${best.reps}`:'';
      }).filter(Boolean);
      sessStr=highlights.join(' · ');
    }
    return `<div class="week-session" style="${isToday?'border-color:var(--neon)':''}">
      <div class="ws-header">
        <div>
          <div class="ws-day">${w.day} <span style="font-size:11px;color:var(--g2);font-weight:400">${d.getDate()}/${d.getMonth()+1}</span></div>
          <div class="ws-type">${w.session}</div>
        </div>
        <div style="text-align:right">
          ${done?'<span class="tag tn">Done ✅</span>':w.type==='rest'?'<span class="tag tg">Rest</span>':'<span class="tag tg">Planned</span>'}
          ${dl.weight?`<div style="font-size:10px;color:var(--g2);margin-top:3px">${dl.weight}kg</div>`:''}
        </div>
      </div>
      ${sessStr?`<div class="ws-lifts">${sessStr}</div>`:''}
      ${tot.kcal>0?`<div style="font-size:10px;color:var(--g2);margin-top:4px">${tot.kcal}kcal · ${tot.p}P · ${tot.c}C · ${tot.f}F</div>`:''}
      <div style="margin-top:8px;display:flex;gap:6px">
        <button class="btn btn-grey btn-xs" onclick="sessDate='${ds}';go('session')">Open Session</button>
        <button class="btn btn-grey btn-xs" onclick="mealsDate='${ds}';go('meals')">Log Meals</button>
      </div>
    </div>`;
  }).join('');
  const weekLabel=weekOffset===0?'This Week':weekOffset===-1?'Last Week':`${Math.abs(weekOffset)} weeks ${weekOffset<0?'ago':'ahead'}`;
  return `<div class="card" style="margin-bottom:8px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <button class="btn btn-grey btn-xs" onclick="weekOffset--;render()">← Prev</button>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--white)">${weekLabel}</div>
      <button class="btn btn-grey btn-xs" onclick="weekOffset++;render()">Next →</button>
    </div>
  </div>${days}`;
}

// ── MEALS ────────────────────────────────────────────────────────────────────
function renderMeals(){
  const di=dateDi(mealsDate);const dtype=isTrain(di)?'training':'rest';
  const tgts=TARGETS[dtype];const td=TDEE[dtype];
  const dl=dayLog(mealsDate);const tot=sumMeals(dl.meals||[]);
  const deficit=td-tot.kcal;
  const foods=allFoods();
  const foodOpts=Object.keys(foods).sort().map(f=>`<option value="${f}">${f}${foods[f].isRecipe?' 🍽':''}${foods[f].kcal?` (${foods[f].kcal}kcal)`:''}</option>`).join('');
  const bars=[
    {l:'Calories',v:tot.kcal,t:tgts.kcal,  c:'#f2f2f2'},
    {l:'Protein', v:tot.p,   t:tgts.protein,c:'#39ff14'},
    {l:'Carbs',   v:tot.c,   t:tgts.carbs,  c:'#888'},
    {l:'Fat',     v:tot.f,   t:tgts.fat,    c:'#555'},
  ].map(({l,v,t,c})=>{const pc=Math.min((v/t)*100,100);const ov=v>t;
    return `<div class="mb"><div class="mbh"><span class="mbl">${l} (/${t})</span><span class="mbv ${ov?'over':''}">${v}</span></div><div class="mbt"><div class="mbf" style="width:${pc}%;background:${ov?'var(--red)':c}"></div></div></div>`;
  }).join('');

  // Plan meals — replace empty foods arrays with recipe suggestions
  const planRows=(PLAN_MEALS[dtype]||[]).map((m,i)=>{
    const hasFoods=m.foods.length>0;
    const mealHint=m.label.includes('Lunch')||m.label.includes('Dinner')||m.label.includes('Pre-Train')||m.label.includes('Gousto')?
      `<div style="font-size:10px;color:var(--g3);margin-top:3px">← Pick from your Recipes or food list</div>`:'';
    return `<div class="pmeal"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div><span class="pmeal-time">${m.time}</span><span style="font-size:11px;color:var(--g2)"> · ${m.label}</span></div>
      ${hasFoods?`<button class="btn-outline" style="font-size:10px;padding:3px 8px" onclick="addPlanMeal(${i},'${dtype}')">Add All</button>`:''}
    </div>
    ${hasFoods?`<div style="font-size:10px;color:var(--g3)">${m.foods.join(', ')}</div>`:mealHint}
    </div>`;
  }).join('');

  const mlog=(dl.meals||[]).length===0?`<div class="empty">No meals logged yet</div>`:
    `<div class="scroll-list">${(dl.meals||[]).map((m,i)=>`<div class="mi"><div style="flex:1"><div class="mi-food">${m.food}</div><div class="mi-meta">${m.time||''} · ${m.kcal}kcal · ${m.p}P · ${m.c}C · ${m.f}F${m.note?' · '+m.note:''}</div></div><button class="mi-del" onclick="removeMeal('${mealsDate}',${i})">×</button></div>`).join('')}</div>`;

  return `
  <div class="card"><div class="ct">Date & Weight</div>
    <div class="field"><input type="date" id="md" value="${mealsDate}" onchange="mealsDate=this.value;render()"></div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input type="number" id="mw" placeholder="Body weight (kg)" step="0.1" value="${dl.weight||''}" style="flex:1">
      <button class="btn btn-grey btn-sm" style="width:auto" onclick="saveWeight()">Save</button>
    </div>
    <button class="btn ${dl.checks?.session?'btn-neon':'btn-grey'} btn-sm" onclick="toggleChk('${mealsDate}','session');render()">${dl.checks?.session?'✅ Session Done':'⬜ Mark Session Done'}</button>
  </div>
  <div class="card"><div class="ct">Log Food</div>
    <div class="field"><label class="fl">Food / Recipe</label><select id="fsel">${foodOpts}</select></div>
    <div class="g2" style="margin-bottom:9px">
      <div class="field" style="margin-bottom:0"><label class="fl">Qty (% / portions)</label><input type="number" id="fqty" value="100" min="10" max="1000"></div>
      <div class="field" style="margin-bottom:0"><label class="fl">Preview</label><div id="fprev" style="background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 11px;font-size:11px;color:var(--g2)">—</div></div>
    </div>
    <div class="field"><label class="fl">Note</label><input type="text" id="fnote" placeholder="e.g. pre-training"></div>
    <button class="btn btn-neon" onclick="addMeal()">+ Add to Log</button>
  </div>
  <div class="card"><div class="ct">Totals vs Target · ${dtype==='training'?'Training':'Rest'} Day</div>${bars}
    <div style="margin-top:10px;padding:8px 11px;background:var(--bg3);border-radius:7px;display:flex;justify-content:space-between;font-size:11px">
      <span style="color:var(--g2)">Est. TDEE</span><span style="color:var(--g1)">${td} kcal</span>
      <span style="color:var(--g2)">Deficit</span><span style="color:${deficit>0?'var(--neon)':'var(--red)'};font-weight:700">${deficit>0?'-'+deficit:'+'+Math.abs(deficit)} kcal</span>
    </div>
  </div>
  <div class="card"><div class="ct">Meal Log (${(dl.meals||[]).length})</div>${mlog}</div>
  <div class="card"><div class="ct">Plan Meals · ${dtype==='training'?'Training':'Rest'} Day</div>${planRows}</div>`;
}

// ── LIFTS ────────────────────────────────────────────────────────────────────
function renderLifts(){
  const p=S.profile;
  const goals=[
    {name:'Back Squat',start:p.squat1rm,target:Math.round(p.squat1rm*1.165)},
    {name:'Bench Press',start:p.bench1rm,target:Math.round(p.bench1rm*1.183)},
    {name:'Deadlift',start:p.deadlift1rm,target:Math.round(p.deadlift1rm*1.165)},
    {name:'Weighted Pull-Up',start:0,target:20},
  ];
  const liftOpts=['Back Squat','Bench Press','Deadlift','Weighted Pull-Up','Trap Bar Deadlift','Romanian Deadlift','Hip Thrust','Incline DB Press','Barbell Row','Shoulder Press','Leg Press','Hip Thrust','Barbell Curl'].map(l=>`<option value="${l}">${l}</option>`).join('');
  const gbars=goals.map(({name,start,target})=>{
    const info=S.lifts[name]||{};const cur=info.current||start;
    const hist=info.history||[];
    const pc=target>start?Math.min(Math.max(((cur-start)/(target-start))*100,2),100):2;
    const recent=hist.slice(-5).reverse().map(h=>`<div class="lift-entry">${h.date} · ${h.kg}kg × ${h.reps} reps${h.rpe?' @ RPE '+h.rpe:''}</div>`).join('');
    return `<div style="margin-bottom:18px">
      <div class="lbh"><span class="lbn">${name}</span>
        <div style="display:flex;gap:5px;align-items:center"><span class="tag tg">${start}kg</span><span class="lbv">${cur}${name==='Weighted Pull-Up'?'kg+':'kg'}</span><span class="tag tn">${target}${name==='Weighted Pull-Up'?'kg+':'kg'} goal</span></div>
      </div>
      <div class="lbt" style="height:6px;margin:5px 0"><div class="lbf" style="width:${Math.max(pc,2)}%"></div></div>
      <div class="lbm">${pc.toFixed(0)}% to target · ${hist.length} sessions logged</div>
      ${recent?`<div style="margin-top:7px">${recent}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="card"><div class="ct">Log a Lift</div>
    <div class="field"><label class="fl">Lift</label><select id="lsel">${liftOpts}</select></div>
    <div class="g3" style="margin-bottom:9px">
      <div class="field" style="margin-bottom:0"><label class="fl">Weight kg</label><input type="number" id="lkg" placeholder="e.g. 100" step="2.5"></div>
      <div class="field" style="margin-bottom:0"><label class="fl">Reps</label><input type="number" id="lreps" placeholder="e.g. 8" min="1"></div>
      <div class="field" style="margin-bottom:0"><label class="fl">RPE</label><input type="number" id="lrpe" placeholder="7" min="1" max="10" step=".5"></div>
    </div>
    <div class="field"><label class="fl">Date</label><input type="date" id="ldate" value="${today()}"></div>
    <button class="btn btn-neon" onclick="logLift()">+ Log Lift</button>
  </div>
  <div class="card"><div class="ct">Progress to Off-Season Targets</div>${gbars}</div>`;
}

// ── WEIGHT ───────────────────────────────────────────────────────────────────
function renderWeight(){
  const p=S.profile;
  const entries=Object.entries(S.logs).filter(([,v])=>v.weight).sort(([a],[b])=>a.localeCompare(b)).map(([d,v])=>({date:d,weight:v.weight}));
  const curW=entries.length>0?entries[entries.length-1].weight:p.startWeight;
  const totalC=(curW-p.startWeight).toFixed(1);
  const rows=entries.length===0?`<div class="empty">No weight entries — log in Meals tab</div>`:
    entries.slice().reverse().map(({date,weight},i,arr)=>{
      const prev=i<arr.length-1?arr[i+1].weight:p.startWeight;
      const diff=(weight-prev).toFixed(1);
      const good=parseFloat(diff)>=-0.75&&parseFloat(diff)<=0;
      const col=parseFloat(diff)>0?'var(--red)':good?'var(--neon)':'var(--amber)';
      return `<div class="wrow"><span class="wrow-date">${date}</span><span class="wrow-kg">${weight}<span style="font-size:11px;color:var(--g2)">kg</span></span><span class="wrow-chg" style="color:${col}">${parseFloat(diff)>0?'+':''}${diff}kg</span></div>`;
    }).join('');
  return `<div class="g3" style="margin-bottom:11px">
    <div class="stat"><div class="sl">Start</div><div class="sv" style="color:var(--g1)">${p.startWeight}<span style="font-size:11px">kg</span></div></div>
    <div class="stat"><div class="sl">Current</div><div class="sv" style="color:var(--white)">${curW}<span style="font-size:11px">kg</span></div></div>
    <div class="stat"><div class="sl">Change</div><div class="sv" style="color:${parseFloat(totalC)>0?'var(--red)':'var(--neon)'}">${parseFloat(totalC)>0?'+':''}${totalC}<span style="font-size:11px">kg</span></div></div>
  </div>
  <div class="card"><div class="ct">Weight Log</div><div class="scroll-list">${rows}</div></div>
  <div class="card"><div class="ct">Target Zones</div>
    <div class="card-dark"><div style="font-size:11px;font-weight:700;color:var(--neon);margin-bottom:2px">Block 1 Weeks 1–5</div><div style="font-size:11px;color:var(--g2)">–0.5 to –0.75kg/week · Fat loss, protect muscle</div></div>
    <div class="card-dark"><div style="font-size:11px;font-weight:700;color:var(--g1);margin-bottom:2px">Block 2 Weeks 6–10</div><div style="font-size:11px;color:var(--g2)">–0.25 to –0.5kg/week · Strength peak</div></div>
    <div class="card-dark"><div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:2px">Red Flag</div><div style="font-size:11px;color:var(--g2)">Dropping &gt;1kg/week OR no change 3+ weeks → adjust calories</div></div>
  </div>`;
}

// ── CHECKS ───────────────────────────────────────────────────────────────────
function renderChecks(){
  const di=dateDi(checkDate);const info=WEEKLY[di];const dl=dayLog(checkDate);
  const isTr=isTrain(di);const isSun=di===6;
  const mk=(items,label)=>{
    const score=items.filter(({key})=>dl.checks?.[key]).length;
    return `<div class="card"><div class="ct">${label} · ${score}/${items.length}</div>
      ${items.map(({key,label:lbl})=>{const done=dl.checks?.[key];return `<div class="chk ${done?'done':''}" onclick="toggleChk('${checkDate}','${key}')"><span class="chk-box">${done?'✅':'⬜'}</span><span class="chk-lbl">${lbl}</span></div>`;}).join('')}
    </div>`;
  };
  return `<div class="card"><div class="ct">Date</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="date" value="${checkDate}" onchange="checkDate=this.value;render()" style="flex:1">
      <span class="tag tn">${info.session}</span>
    </div>
  </div>
  ${mk(CHECKS_DAILY,'Daily Non-Negotiables')}
  ${isTr?mk(CHECKS_TRAIN,'Training Day'):''}
  ${isSun?mk(CHECKS_SUN,'Sunday Batch Cook'):''}`;
}

// ── PROFILE ──────────────────────────────────────────────────────────────────
function renderProfile(){
  const p=S.profile;
  return `<div class="card"><div class="ct">Athlete Profile</div>
    <div class="field"><label class="fl">Name</label><input type="text" id="pr-name" value="${p.name}"></div>
    <div class="g2">
      <div class="field"><label class="fl">Start Weight (kg)</label><input type="number" id="pr-sw" value="${p.startWeight}" step=".1"></div>
      <div class="field"><label class="fl">Start Date</label><input type="date" id="pr-sd" value="${p.startDate}"></div>
    </div>
    <div class="ct" style="margin-top:4px">1 Rep Maxes (kg)</div>
    <div class="g3">
      <div class="field"><label class="fl">Squat 1RM</label><input type="number" id="pr-sq" value="${p.squat1rm}" step=".5"></div>
      <div class="field"><label class="fl">Bench 1RM</label><input type="number" id="pr-bp" value="${p.bench1rm}" step=".5"></div>
      <div class="field"><label class="fl">Deadlift 1RM</label><input type="number" id="pr-dl" value="${p.deadlift1rm}" step=".5"></div>
    </div>
    <button class="btn btn-neon" onclick="saveProfile()">Save Profile</button>
    <div class="divider"></div>
    <div class="ct">1RM Calculator (Epley)</div>
    <div style="font-size:11px;color:var(--g2);margin-bottom:10px">Enter any working set to estimate your 1RM.</div>
    <div class="g3">
      <div class="field"><label class="fl">Weight (kg)</label><input type="number" id="calc-kg" placeholder="e.g. 100" step="2.5"></div>
      <div class="field"><label class="fl">Reps</label><input type="number" id="calc-reps" placeholder="e.g. 10" min="1"></div>
      <div class="field"><label class="fl">1RM Est.</label><div id="calc-result" style="background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 11px;font-size:14px;font-weight:700;color:var(--neon)">—</div></div>
    </div>
  </div>`;
}

// ── DATA ─────────────────────────────────────────────────────────────────────
function renderData(){
  const ec=Object.keys(S.logs).length;
  const lc=Object.values(S.lifts).reduce((a,l)=>a+(l.history||[]).length,0);
  return `<div class="card"><div class="ct">iCloud Backup</div>
    <div style="font-size:12px;color:var(--g2);margin-bottom:12px;line-height:1.6">Export all data as JSON → save to iCloud Drive. Import to restore on any device.</div>
    <div style="font-size:11px;color:var(--g3);margin-bottom:12px">${ec} days logged · ${lc} lift entries · ${(S.recipes||[]).length} recipes</div>
    <div class="io-row">
      <button class="btn btn-neon" onclick="exportData()">⬇ Export</button>
      <button class="btn btn-grey" onclick="document.getElementById('imp').click()">⬆ Import</button>
    </div>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(this)">
  </div>
  <div class="card"><div class="ct">Supplement Schedule</div>
    ${[{t:'Breakfast',i:'Creatine 5g + Vitamin D3'},{t:'Pre-Bed',i:'Casein 1 scoop + Magnesium 300–400mg'},{t:'Training',i:'Electrolytes during/post session'},{t:'Post-Train',i:'Whey 2 scoops in smoothie immediately after'}].map(({t,i})=>`<div class="card-dark"><span style="font-size:11px;font-weight:700;color:var(--neon)">${t}</span><div style="font-size:11px;color:var(--g2);margin-top:2px">${i}</div></div>`).join('')}
  </div>
  <div class="card"><div class="ct">Danger Zone</div><button class="btn btn-danger" onclick="confirmClear()">🗑 Clear All Data</button></div>`;
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function toggleChk(date,key){const dl=dayLog(date);if(!dl.checks)dl.checks={};dl.checks[key]=!dl.checks[key];saveState();render();}
function saveWeight(){const w=parseFloat(document.getElementById('mw')?.value);if(!w||isNaN(w))return;dayLog(mealsDate).weight=w;saveState();render();}
function addMeal(){const food=document.getElementById('fsel')?.value;const qty=parseFloat(document.getElementById('fqty')?.value)||100;const note=document.getElementById('fnote')?.value||'';if(!food)return;const m=fm(food,qty);const dl=dayLog(mealsDate);dl.meals.push({food,qty,note,...m,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});saveState();if(document.getElementById('fnote'))document.getElementById('fnote').value='';render();}
function addPlanMeal(idx,dtype){const plan=PLAN_MEALS[dtype][idx];if(!plan.foods.length)return;const dl=dayLog(mealsDate);plan.foods.forEach(food=>{const m=fm(food);dl.meals.push({food,qty:100,note:'Plan',...m,time:plan.time});});saveState();render();}
function removeMeal(date,idx){const dl=dayLog(date);dl.meals.splice(idx,1);saveState();render();}
function logLift(){const name=document.getElementById('lsel')?.value;const kg=parseFloat(document.getElementById('lkg')?.value);const reps=parseInt(document.getElementById('lreps')?.value)||0;const rpe=parseFloat(document.getElementById('lrpe')?.value)||0;const date=document.getElementById('ldate')?.value||today();if(!name||!kg||isNaN(kg))return;if(!S.lifts[name])S.lifts[name]={current:kg,history:[]};S.lifts[name].history.push({date,kg,reps,rpe});if(kg>(S.lifts[name].current||0))S.lifts[name].current=kg;saveState();['lkg','lreps','lrpe'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});render();}
function saveProfile(){const p=S.profile;p.name=document.getElementById('pr-name')?.value||p.name;p.startWeight=parseFloat(document.getElementById('pr-sw')?.value)||p.startWeight;p.startDate=document.getElementById('pr-sd')?.value||p.startDate;p.squat1rm=parseFloat(document.getElementById('pr-sq')?.value)||p.squat1rm;p.bench1rm=parseFloat(document.getElementById('pr-bp')?.value)||p.bench1rm;p.deadlift1rm=parseFloat(document.getElementById('pr-dl')?.value)||p.deadlift1rm;saveState();render();}
function calc1rm(){const kg=parseFloat(document.getElementById('calc-kg')?.value);const reps=parseInt(document.getElementById('calc-reps')?.value);const el=document.getElementById('calc-result');if(!kg||!reps||isNaN(kg)||isNaN(reps)){if(el)el.textContent='—';return;}if(el)el.textContent=Math.round(kg*(1+reps/30))+'kg';}
function startMain(sk){if(!S.sessState[sk])S.sessState[sk]={phase:'warmup',exIdx:0,sets:{},notes:{}};S.sessState[sk].phase='main';saveState();render();}
function nextEx(sk,isLast){const ss=S.sessState[sk];if(isLast==='true'){ss.phase='done';saveState();render();return;}ss.exIdx++;saveState();render();}
function prevEx(sk){const ss=S.sessState[sk];if(ss.exIdx>0){ss.exIdx--;saveState();render();}}
function resetSess(sk){S.sessState[sk]={phase:'warmup',exIdx:0,sets:{},notes:{}};saveState();render();}
function setVal(sk,exI,si,field,val){if(!S.sessState[sk]?.sets[exI])return;S.sessState[sk].sets[exI][si][field]=val;}
function setNote(sk,exI,val){if(!S.sessState[sk])return;if(!S.sessState[sk].notes)S.sessState[sk].notes={};S.sessState[sk].notes[exI]=val;}
function toggleSetDone(sk,exI,si){if(!S.sessState[sk]?.sets[exI])return;S.sessState[sk].sets[exI][si].done=!S.sessState[sk].sets[exI][si].done;saveState();render();}

function newRecipe(){recipeTab='build';recipeEditId=null;recipeIngredients=[];render();}
function editRecipe(i){recipeTab='build';recipeEditId=i;recipeIngredients=(S.recipes[i]?.ingredients||[]);render();}
function deleteRecipe(i){if(confirm('Delete this recipe?')){S.recipes.splice(i,1);saveState();recipeTab='list';recipeEditId=null;render();}}
function logRecipeFromList(i){const r=S.recipes[i];const dl=dayLog(mealsDate);const m=fm(r.name);dl.meals.push({food:r.name,qty:100,note:'1 portion',...m,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});saveState();go('meals');}
function addIngredient(){const food=document.getElementById('ing-food')?.value;const qty=parseFloat(document.getElementById('ing-qty')?.value)||100;if(!food)return;const m=fm(food,qty);recipeIngredients.push({name:food,qty,...m});render();}
function removeIngredient(i){recipeIngredients.splice(i,1);render();}
function saveRecipe(){
  const name=document.getElementById('rec-name')?.value?.trim();
  if(!name){alert('Please enter a recipe name.');return;}
  const portions=parseInt(document.getElementById('rec-portions')?.value)||5;
  const type=document.getElementById('rec-type')?.value||'Other';
  const ingTotal=recipeIngredients.reduce((a,i)=>({kcal:a.kcal+i.kcal,p:a.p+i.p,c:a.c+i.c,f:a.f+i.f}),{kcal:0,p:0,c:0,f:0});
  const mKcal=parseFloat(document.getElementById('rec-kcal')?.value);
  const mP=parseFloat(document.getElementById('rec-p')?.value);
  const mC=parseFloat(document.getElementById('rec-c')?.value);
  const mF=parseFloat(document.getElementById('rec-f')?.value);
  const totalKcal=mKcal||ingTotal.kcal;const totalP=mP||ingTotal.p;const totalC=mC||ingTotal.c;const totalF=mF||ingTotal.f;
  if(!totalKcal){alert('Please add ingredients or enter total macros.');return;}
  const rec={name,type,portions,ingredients:[...recipeIngredients],
    portionKcal:Math.round(totalKcal/portions),portionP:Math.round(totalP/portions),
    portionC:Math.round(totalC/portions),portionF:Math.round(totalF/portions)};
  if(recipeEditId!==null)S.recipes[recipeEditId]=rec;
  else S.recipes.push(rec);
  saveState();recipeTab='list';recipeEditId=null;recipeIngredients=[];render();
}

function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`connor_dashboard_${today().replace(/-/g,'')}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}
function importData(input){const file=input.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{try{const parsed=JSON.parse(e.target.result);if(parsed.logs!==undefined||parsed.lifts!==undefined||parsed.recipes!==undefined){S={...S,...parsed};saveState();render();alert('Imported successfully.');}else{alert('Invalid backup file.');}}catch{alert('Could not read file.');}};r.readAsText(file);}
function confirmClear(){if(confirm('Delete ALL data? Cannot be undone.')){S={profile:{...DEFAULT_PROFILE},logs:{},lifts:{},sessState:{},recipes:[],customFoods:[]};saveState();render();}}

function updateFoodPreview(){const sel=document.getElementById('fsel');const qty=parseFloat(document.getElementById('fqty')?.value)||100;const el=document.getElementById('fprev');if(!sel||!el)return;const m=fm(sel.value,qty);el.textContent=`${m.kcal}kcal · ${m.p}P · ${m.c}C · ${m.f}F`;}
function bindEv(){
  const fs=document.getElementById('fsel');const fq=document.getElementById('fqty');
  if(fs){fs.addEventListener('change',updateFoodPreview);updateFoodPreview();}
  if(fq)fq.addEventListener('input',updateFoodPreview);
  const ck=document.getElementById('calc-kg');const cr=document.getElementById('calc-reps');
  if(ck)ck.addEventListener('input',calc1rm);if(cr)cr.addEventListener('input',calc1rm);
}

loadState();
updateHdr();
render();
</script>
</body>
</html>

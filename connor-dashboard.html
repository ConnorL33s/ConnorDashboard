<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Connor Dashboard">
<meta name="theme-color" content="#0d0d0d">
<title>Connor Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--bg4:#242424;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#e8e8e8;--g1:#999;--g2:#5a5a5a;--g3:#333;
  --neon:#2ecc40;--neon2:#23a033;--ndim:#0a1f0d;
  --red:#e84040;--amber:#e8a020;--white:#f5f5f5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none}
.hdr{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 0 0}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.hdr-logo{display:flex;align-items:center;gap:9px}
.hdr-icon{width:32px;height:32px;background:var(--ndim);border:1px solid var(--neon2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:.1em;text-transform:uppercase;color:var(--white)}
.hdr-sub{font-size:9px;color:var(--g2);letter-spacing:.12em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:600}
.hdr-right{text-align:right}
.hdr-lifts{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--neon);letter-spacing:.05em}
.hdr-wt{font-size:10px;color:var(--g2)}
.nav{display:flex;overflow-x:auto;border-top:1px solid var(--border);scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;background:none;border:none;cursor:pointer;padding:9px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--g2);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.nb.active{color:var(--neon);border-bottom-color:var(--neon)}
.body{padding:12px;padding-bottom:48px;max-width:860px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:11px}
.card-dark{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}
.ct{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--g2);margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px 10px}
.sl{font-size:9px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;line-height:1;margin-bottom:2px}
.ss{font-size:10px;color:var(--g2)}
.mb{margin-bottom:10px}
.mbh{display:flex;justify-content:space-between;margin-bottom:3px}
.mbl{font-size:10px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.mbv{font-size:11px;font-weight:700;color:var(--text)}
.mbv.over{color:var(--red)}
.mbt{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.mbf{height:100%;border-radius:3px;transition:width .4s ease}
.msm{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:12px}
.mt{background:var(--bg3);border-radius:7px;padding:9px 4px;text-align:center}
.mtv{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;margin-bottom:1px}
.mtv.over{color:var(--red)!important}
.mtl{font-size:9px;color:var(--g2)}
.lb{margin-bottom:14px}
.lbh{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.lbn{font-size:12px;font-weight:600;color:var(--text)}
.lbv{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:var(--neon)}
.lbt{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:2px}
.lbf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g3),var(--neon));transition:width .4s}
.lbm{font-size:9px;color:var(--g3)}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:9px 11px;font-size:14px;font-family:'Barlow',sans-serif;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--neon)}
input[type="date"]{color-scheme:dark}
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.ghost-input{position:relative}
.ghost-input input{position:relative;z-index:2;background:transparent}
.ghost-val{position:absolute;top:50%;left:11px;transform:translateY(-50%);font-size:14px;color:var(--g3);z-index:1;pointer-events:none;font-family:'Barlow',sans-serif}
.btn{display:block;width:100%;border:none;border-radius:7px;padding:11px 14px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-neon{background:var(--neon);color:#000}
.btn-grey{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-outline{background:none;color:var(--neon);border:1px solid var(--neon);border-radius:7px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.06em;cursor:pointer}
.btn-danger{background:none;color:var(--red);border:1px solid rgba(232,64,64,.3);font-size:12px;padding:8px}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px;width:auto;display:inline-block;border-radius:6px}
.field{margin-bottom:10px}
.fl{font-size:9px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;display:block}
.chk{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;user-select:none;transition:background .15s,border-color .15s}
.chk.done{background:var(--ndim);border-color:var(--neon2)}
.chk-box{font-size:17px;flex-shrink:0}
.chk-lbl{font-size:12px;color:var(--g1)}
.chk.done .chk-lbl{color:var(--neon)}
.mi{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;margin-bottom:5px}
.mi-food{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.mi-meta{font-size:10px;color:var(--g2)}
.mi-del{background:none;border:none;color:var(--red);font-size:19px;cursor:pointer;padding:3px 7px;flex-shrink:0}
.ws{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wd{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 2px;text-align:center}
.wd.today{background:#081400;border-color:var(--neon)}
.wdn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.07em;color:var(--g2);margin-bottom:3px}
.wd.today .wdn{color:var(--neon)}
.wds{font-size:8px;color:var(--g3);line-height:1.3;margin-bottom:4px}
.wdi{font-size:13px}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase}
.tn{background:var(--ndim);color:var(--neon)}
.tg{background:var(--bg4);color:var(--g1)}
.tr{background:#1a0000;color:var(--red)}
.ta{background:#1a1000;color:var(--amber)}
.alert{padding:9px 13px;border-radius:7px;font-size:11px;margin-bottom:9px;border-left:3px solid}
.alert-a{background:#110e00;border-color:var(--amber);color:var(--amber)}
.alert-n{background:#081400;border-color:var(--neon);color:var(--neon)}
.alert-r{background:#1a0000;border-color:var(--red);color:var(--red)}
.spips{display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap}
.spip{height:4px;flex:1;border-radius:2px;background:var(--bg4);min-width:8px;transition:background .3s}
.spip.dp{background:var(--neon)}.spip.cp{background:var(--g2)}
.ex-card{background:var(--bg3);border:1px solid var(--neon2);border-radius:11px;padding:15px;margin-bottom:11px}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;color:var(--white);letter-spacing:.05em;margin-bottom:3px}
.ex-target{font-size:12px;color:var(--neon);font-weight:600;margin-bottom:3px}
.ex-last{font-size:11px;color:var(--g2);margin-bottom:3px}
.ex-cue{font-size:11px;color:var(--g2);margin-bottom:12px;line-height:1.5;font-style:italic}
.set-row{display:flex;gap:6px;align-items:center;margin-bottom:7px}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:var(--g2);width:36px;flex-shrink:0}
.sdb{width:34px;height:34px;border-radius:7px;border:none;cursor:pointer;font-size:15px;flex-shrink:0;transition:background .15s}
.sdb-on{background:var(--neon);color:#000}.sdb-off{background:var(--bg4);color:var(--g2)}
.wu-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.wu-item:last-child{border-bottom:none}
.wu-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:var(--neon);min-width:18px}
.wu-text{font-size:12px;color:var(--g1);line-height:1.4}
.wu-note{font-size:10px;color:var(--g2);margin-top:2px}
.rec-item{padding:11px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.rec-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.rec-meta{font-size:10px;color:var(--g2);margin-bottom:6px}
.rec-actions{display:flex;gap:6px;flex-wrap:wrap}
.week-session{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}
.wrow{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;margin-bottom:5px}
.wrow-date{font-size:12px;color:var(--g1)}
.wrow-kg{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:var(--text)}
.wrow-chg{font-size:12px;font-weight:700}
.lift-entry{font-size:11px;color:var(--g2);padding:3px 0;border-bottom:1px solid var(--border)}
.lift-entry:last-child{border-bottom:none}
.divider{height:1px;background:var(--border);margin:12px 0}
.empty{text-align:center;padding:20px 0;color:var(--g2);font-size:12px}
.scroll-list{max-height:340px;overflow-y:auto}
.io-row{display:flex;gap:7px}.io-row .btn{flex:1}
.sess-done{text-align:center;padding:28px 18px}
.sess-done-icon{font-size:48px;margin-bottom:10px}
.sess-done-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--neon);letter-spacing:.08em;margin-bottom:7px}
.sess-done-sub{font-size:13px;color:var(--g1);line-height:1.6}
.shop-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;margin-bottom:5px;cursor:pointer}
.shop-item.ticked{opacity:.5}
.shop-cat{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--neon);margin:14px 0 6px}
.supp-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}
.supp-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.supp-bar-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:4px}
.supp-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.supp-meta{font-size:10px;color:var(--g2)}
.phase-banner{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:10px;background:var(--ndim);border:1px solid var(--neon2);color:var(--neon);display:flex;align-items:center;gap:8px}
.nutr-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px}
.nutr-day-col{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 4px;text-align:center;cursor:pointer}
.nutr-day-col.today{border-color:var(--neon)}
.nutr-day-lbl{font-size:9px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-bottom:4px}
.nutr-day-kcal{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:900;color:var(--text)}
.nutr-day-p{font-size:9px;color:var(--neon)}
@media(max-width:480px){.g4{grid-template-columns:repeat(2,1fr)}.sv{font-size:19px}.wds{display:none}.msm{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

  const curW=entries.length>0?entries[entries.length-1].weight:p.startWeight;
  const totalC=(curW-p.startWeight).toFixed(1);
  const rows=entries.length===0?'<div class="empty">No weight entries — log in Meals tab</div>':entries.slice().reverse().map(({date,weight},i,arr)=>{const prev=i<arr.length-1?arr[i+1].weight:p.startWeight;const diff=(weight-prev).toFixed(1);const good=parseFloat(diff)>=-0.75&&parseFloat(diff)<=0;const col=parseFloat(diff)>0?'var(--red)':good?'var(--neon)':'var(--amber)';return '<div class="wrow"><span class="wrow-date">'+date+'</span><span class="wrow-kg">'+weight+'<span style="font-size:11px;color:var(--g2)">kg</span></span><span class="wrow-chg" style="color:'+col+'">'+(parseFloat(diff)>0?'+':'')+diff+'kg</span></div>';}).join('');
  return '<div class="g3" style="margin-bottom:11px"><div class="stat"><div class="sl">Start</div><div class="sv" style="color:var(--g1)">'+p.startWeight+'<span style="font-size:11px">kg</span></div></div><div class="stat"><div class="sl">Current</div><div class="sv" style="color:var(--white)">'+curW+'<span style="font-size:11px">kg</span></div></div><div class="stat"><div class="sl">Change</div><div class="sv" style="color:'+(parseFloat(totalC)>0?'var(--red)':'var(--neon)')+';">'+(parseFloat(totalC)>0?'+':'')+totalC+'<span style="font-size:11px">kg</span></div></div></div><div class="card"><div class="ct">Weight Log</div><div class="scroll-list">'+rows+'</div></div><div class="card"><div class="ct">Target Zones</div><div class="card-dark"><div style="font-size:11px;font-weight:700;color:var(--neon);margin-bottom:2px">Block 1 Weeks 1–5</div><div style="font-size:11px;color:var(--g2)">–0.5 to –0.75kg/week · Fat loss, protect muscle</div></div><div class="card-dark"><div style="font-size:11px;font-weight:700;color:var(--g1);margin-bottom:2px">Block 2 Weeks 6–10</div><div style="font-size:11px;color:var(--g2)">–0.25 to –0.5kg/week · Strength peak</div></div><div class="card-dark"><div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:2px">Red Flag</div><div style="font-size:11px;color:var(--g2)">Dropping >1kg/week OR no change 3+ weeks → adjust</div></div></div>';
}
function rSupps(){
  const cards=SUPP_DEFS.map(sd=>{
    const st=S.supplements[sd.id]||{};const hasData=st.openedDate&&st.openingStock;
    let rem=0,dl=0,pc=0;
    if(hasData){const ds=Math.floor((new Date()-new Date(st.openedDate))/86400000);rem=Math.max(st.openingStock-(ds*sd.dailyDose),0);dl=Math.round(rem/sd.dailyDose);pc=Math.round((rem/st.openingStock)*100);}
    const col=pc>30?'var(--neon)':pc>15?'var(--amber)':'var(--red)';
    return '<div class="supp-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div class="supp-name">'+sd.name+'</div><div class="supp-meta">'+sd.packLabel+' · '+sd.dailyDose+sd.unit+'/day</div></div>'+(hasData?'<div style="text-align:right"><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:18px;font-weight:900;color:'+col+'">'+dl+'d</div><div style="font-size:10px;color:var(--g2)">left</div></div>':'')+'</div>'+(hasData?'<div class="supp-bar-track"><div class="supp-bar-fill" style="width:'+pc+'%;background:'+col+'"></div></div><div class="supp-meta">'+rem+sd.unit+' remaining · '+pc+'% of pack</div><div style="margin-top:8px;display:flex;gap:6px"><button class="btn btn-neon btn-xs" onclick="newPack(\''+sd.id+'\')">New Pack Opened</button><button class="btn btn-grey btn-xs" onclick="editStock(\''+sd.id+'\',\''+sd.unit+'\')">Edit Stock</button></div>':'<div style="font-size:11px;color:var(--g2);margin-bottom:8px">No stock entered yet.</div><button class="btn btn-neon btn-xs" onclick="editStock(\''+sd.id+'\',\''+sd.unit+'\')">Set Opening Stock</button>')+'</div>';
  }).join('');
  return '<div class="card"><div class="ct">Supplement Tracker</div><div style="font-size:11px;color:var(--g2);margin-bottom:14px">Track pack levels. Low stock alerts appear on Dashboard when ≤7 days remain.</div>'+cards+'</div>';
}
function rChecks(){
  const di=dateDi(checkDate);const wk=getW();const info=wk[di];const dl=dayLog(checkDate);
  const isTr=isTrain(di);const isSun=di===6;
  const mk=(items,label)=>{const score=items.filter(({key})=>dl.checks?.[key]).length;return '<div class="card"><div class="ct">'+label+' · '+score+'/'+items.length+'</div>'+items.map(({key,label:lbl})=>{const done=dl.checks?.[key];return '<div class="chk '+(done?'done':'')+'" onclick="toggleChk(\''+checkDate+'\',\''+key+'\')"><span class="chk-box">'+(done?'✅':'⬜')+'</span><span class="chk-lbl">'+lbl+'</span></div>';}).join('')+'</div>';};
  return '<div class="card"><div class="ct">Date</div><div style="display:flex;gap:8px;align-items:center"><input type="date" value="'+checkDate+'" onchange="checkDate=this.value;render()" style="flex:1"><span class="tag tn">'+info.session+'</span></div></div>'+mk(CD,'Daily Non-Negotiables')+(isTr?mk(CT,'Training Day'):'')+(isSun?mk(CS,'Sunday Batch Cook'):'');
}
function rProfile(){
  const p=S.profile;
  const po=['offseason','preseason','inseason'].map(ph=>'<option value="'+ph+'" '+(p.phase===ph?'selected':'')+'>'+PHASES[ph].name+'</option>').join('');
  return '<div class="card"><div class="ct">Athlete Profile</div><div class="field"><label class="fl">Name</label><input type="text" id="pr-name" value="'+p.name+'"></div><div class="g2"><div class="field"><label class="fl">Start Weight (kg)</label><input type="number" id="pr-sw" value="'+p.startWeight+'" step=".1"></div><div class="field"><label class="fl">Start Date</label><input type="date" id="pr-sd" value="'+p.startDate+'"></div></div><div class="ct" style="margin-top:4px">1 Rep Maxes (kg)</div><div class="g3"><div class="field"><label class="fl">Squat 1RM</label><input type="number" id="pr-sq" value="'+p.squat1rm+'" step=".5"></div><div class="field"><label class="fl">Bench 1RM</label><input type="number" id="pr-bp" value="'+p.bench1rm+'" step=".5"></div><div class="field"><label class="fl">Deadlift 1RM</label><input type="number" id="pr-dl" value="'+p.deadlift1rm+'" step=".5"></div></div><div class="ct" style="margin-top:4px">Training Phase</div><div class="field"><label class="fl">Current Phase</label><select id="pr-phase">'+po+'</select></div><div class="g2"><div class="field"><label class="fl">Pre-Season Start Date</label><input type="date" id="pr-pre" value="'+(p.preseasonDate||'')+'"></div><div class="field"><label class="fl">In-Season Start Date</label><input type="date" id="pr-ins" value="'+(p.inseasonDate||'')+'"></div></div><button class="btn btn-neon" onclick="saveProfile()">Save Profile</button><div class="divider"></div><div class="ct">1RM Calculator (Epley)</div><div class="g3"><div class="field"><label class="fl">Weight (kg)</label><input type="number" id="calc-kg" placeholder="100" step="2.5"></div><div class="field"><label class="fl">Reps</label><input type="number" id="calc-reps" placeholder="10" min="1"></div><div class="field"><label class="fl">1RM Est.</label><div id="calc-result" style="background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 11px;font-size:14px;font-weight:700;color:var(--neon)">—</div></div></div></div>';
}
function rData(){
  const ec=Object.keys(S.logs).length;const lc=Object.values(S.lifts).reduce((a,l)=>a+(l.history||[]).length,0);
  return '<div class="card"><div class="ct">iCloud Backup</div><div style="font-size:12px;color:var(--g2);margin-bottom:12px;line-height:1.6">Export all data as JSON → save to iCloud Drive. Import to restore on any device.</div><div style="font-size:11px;color:var(--g3);margin-bottom:12px">'+ec+' days logged · '+lc+' lift entries · '+(S.recipes||[]).length+' recipes</div><div class="io-row"><button class="btn btn-neon" onclick="exportData()">⬇ Export</button><button class="btn btn-grey" onclick="document.getElementById(\'imp\').click()">⬆ Import</button></div><input type="file" id="imp" accept=".json" style="display:none" onchange="importData(this)"></div><div class="card"><div class="ct">Supplement Schedule</div>'+[{t:'Breakfast',i:'Creatine 5g + Vitamin D3'},{t:'Pre-Bed',i:'Casein 1 scoop + Magnesium 300–400mg'},{t:'Training',i:'Electrolytes during/post session'},{t:'Post-Train',i:'Whey 2 scoops in smoothie immediately'}].map(({t,i})=>'<div class="card-dark"><span style="font-size:11px;font-weight:700;color:var(--neon)">'+t+'</span><div style="font-size:11px;color:var(--g2);margin-top:2px">'+i+'</div></div>').join('')+'</div><div class="card"><div class="ct">Danger Zone</div><button class="btn btn-danger" onclick="confirmClear()">🗑 Clear All Data</button></div>';
}
function toggleChk(date,key){const dl=dayLog(date);if(!dl.checks)dl.checks={};dl.checks[key]=!dl.checks[key];saveState();render();}
function saveWeight(){const w=parseFloat(document.getElementById('mw')?.value);if(!w||isNaN(w))return;dayLog(mealsDate).weight=w;saveState();render();}
function addMeal(){const food=document.getElementById('fsel')?.value;const qty=parseFloat(document.getElementById('fqty')?.value)||100;const note=document.getElementById('fnote')?.value||'';if(!food)return;const m=fm(food,qty);const dl=dayLog(mealsDate);dl.meals.push({food,qty,note,...m,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});saveState();const fn=document.getElementById('fnote');if(fn)fn.value='';render();}
function addPlanMeal(idx,dtype){const plan=PM[dtype][idx];if(!plan.foods.length)return;const dl=dayLog(mealsDate);plan.foods.forEach(food=>{const m=fm(food);dl.meals.push({food,qty:100,note:'Plan',...m,time:plan.time});});saveState();render();}
function removeMeal(date,idx){const dl=dayLog(date);dl.meals.splice(idx,1);saveState();render();}
function logLift(){const name=document.getElementById('lsel')?.value;const kg=parseFloat(document.getElementById('lkg')?.value);const reps=parseInt(document.getElementById('lreps')?.value)||0;const rpe=parseFloat(document.getElementById('lrpe')?.value)||0;const date=document.getElementById('ldate')?.value||today();if(!name||!kg||isNaN(kg))return;if(!S.lifts[name])S.lifts[name]={current:kg,history:[]};S.lifts[name].history.push({date,kg,reps,rpe});if(kg>(S.lifts[name].current||0))S.lifts[name].current=kg;saveState();['lkg','lreps','lrpe'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});render();}
function saveProfile(){const p=S.profile;p.name=document.getElementById('pr-name')?.value||p.name;p.startWeight=parseFloat(document.getElementById('pr-sw')?.value)||p.startWeight;p.startDate=document.getElementById('pr-sd')?.value||p.startDate;p.squat1rm=parseFloat(document.getElementById('pr-sq')?.value)||p.squat1rm;p.bench1rm=parseFloat(document.getElementById('pr-bp')?.value)||p.bench1rm;p.deadlift1rm=parseFloat(document.getElementById('pr-dl')?.value)||p.deadlift1rm;p.phase=document.getElementById('pr-phase')?.value||p.phase;p.preseasonDate=document.getElementById('pr-pre')?.value||'';p.inseasonDate=document.getElementById('pr-ins')?.value||'';p.block=PHASES[p.phase]?.block||p.block;saveState();render();}
function calc1rm(){const kg=parseFloat(document.getElementById('calc-kg')?.value);const reps=parseInt(document.getElementById('calc-reps')?.value);const el=document.getElementById('calc-result');if(!kg||!reps||isNaN(kg)||isNaN(reps)){if(el)el.textContent='—';return;}if(el)el.textContent=Math.round(kg*(1+reps/30))+'kg';}
function calcRPE(){const rm=parseFloat(document.getElementById('rpe-1rm')?.value);const pc=parseFloat(document.getElementById('rpe-rpe')?.value);const el=document.getElementById('rpe-result');if(!rm||isNaN(rm)){if(el)el.textContent='—';return;}if(el)el.textContent=Math.round(rm*pc/2.5)*2.5+'kg';}
function startMain(sk){if(!S.sessState[sk])S.sessState[sk]={phase:'warmup',exIdx:0,sets:{},notes:{}};S.sessState[sk].phase='main';saveState();render();}
function nextEx(sk,isLast){const ss=S.sessState[sk];if(isLast==='true'){ss.phase='done';saveState();render();return;}ss.exIdx++;saveState();render();}
function prevEx(sk){const ss=S.sessState[sk];if(ss.exIdx>0){ss.exIdx--;saveState();render();}}
function resetSess(sk){S.sessState[sk]={phase:'warmup',exIdx:0,sets:{},notes:{}};saveState();render();}
function setVal(sk,exI,si,field,val){if(!S.sessState[sk]?.sets[exI])return;S.sessState[sk].sets[exI][si][field]=val;}
function setNote(sk,exI,val){if(!S.sessState[sk])return;if(!S.sessState[sk].notes)S.sessState[sk].notes={};S.sessState[sk].notes[exI]=val;}
function toggleSetDone(sk,exI,si){if(!S.sessState[sk]?.sets[exI])return;S.sessState[sk].sets[exI][si].done=!S.sessState[sk].sets[exI][si].done;saveState();render();}
function newRec(){recipeTab='build';recipeEditId=null;recipeViewId=null;recipeIngredients=[];render();}
function editRec(i){recipeTab='build';recipeEditId=i;recipeViewId=null;recipeIngredients=(S.recipes[i]?.ingredients||[]).map(ing=>{const m=fm(ing.name,parseFloat(ing.qty)||100);return{name:ing.name,qty:parseFloat(ing.qty)||100,...m};});render();}
function delRec(i){if(confirm('Delete this recipe?')){S.recipes.splice(i,1);saveState();recipeTab='list';recipeEditId=null;render();}}
function logRecFromList(i){const r=S.recipes[i];const dl=dayLog(mealsDate);const m=fm(r.name);dl.meals.push({food:r.name,qty:100,note:'1 portion',...m,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});saveState();recipeViewId=null;go('meals');}
function addIng(){const food=document.getElementById('ing-food')?.value;const qty=parseFloat(document.getElementById('ing-qty')?.value)||100;if(!food)return;const m=fm(food,qty);recipeIngredients.push({name:food,qty,...m});render();}
function rmIng(i){recipeIngredients.splice(i,1);render();}
function saveRec(){
  const name=document.getElementById('rec-name')?.value?.trim();if(!name){alert('Please enter a recipe name.');return;}
  const portions=parseInt(document.getElementById('rec-portions')?.value)||5;
  const type=document.getElementById('rec-type')?.value||'Other';
  const method=document.getElementById('rec-method')?.value||'';
  const ingTotal=recipeIngredients.reduce((a,i)=>({kcal:a.kcal+i.kcal,p:a.p+i.p,c:a.c+i.c,f:a.f+i.f}),{kcal:0,p:0,c:0,f:0});
  const mK=parseFloat(document.getElementById('rec-kcal')?.value);const mP=parseFloat(document.getElementById('rec-p')?.value);
  const mC=parseFloat(document.getElementById('rec-c')?.value);const mF=parseFloat(document.getElementById('rec-f')?.value);
  const tK=mK||ingTotal.kcal;const tP=mP||ingTotal.p;const tC=mC||ingTotal.c;const tF=mF||ingTotal.f;
  if(!tK){alert('Please add ingredients or enter total macros.');return;}
  const rec={name,type,portions,method,ingredients:[...recipeIngredients],portionKcal:Math.round(tK/portions),portionP:Math.round(tP/portions),portionC:Math.round(tC/portions),portionF:Math.round(tF/portions)};
  if(recipeEditId!==null)S.recipes[recipeEditId]=rec;else S.recipes.push(rec);
  saveState();recipeTab='list';recipeEditId=null;recipeIngredients=[];render();
}
function toggleSS(key){if(key.startsWith('s'))shopSel[key]=shopSel[key]===false?true:false;else shopSel[key]=!shopSel[key];render();}
function genShop(){shopGen=true;S.shopTicked={};saveState();render();}
function tickShop(k){if(!S.shopTicked)S.shopTicked={};S.shopTicked[k]=!S.shopTicked[k];saveState();render();}
function clearTicks(){S.shopTicked={};saveState();render();}
function shareList(){
  const recs=S.recipes||[];let text='Connor Dashboard — Shopping List ('+shopDays+' days)\n\n';
  const cats={};
  recs.filter((_,i)=>shopSel['r'+i]).forEach(r=>{if(r.ingredients)r.ingredients.forEach(ing=>{if(!cats['Recipe Ingredients'])cats['Recipe Ingredients']=[];cats['Recipe Ingredients'].push(ing.name+' — '+ing.qty);});});
  STAPLES.forEach(s=>{if(shopSel['s'+s.name]===false)return;if(!cats[s.cat])cats[s.cat]=[];cats[s.cat].push(s.name+' — '+s.packSize+' ('+s.store+')');});
  Object.entries(cats).forEach(([cat,items])=>{text+=cat.toUpperCase()+'\n'+items.map(i=>'• '+i).join('\n')+'\n\n';});
  if(navigator.share){navigator.share({title:'Shopping List',text});}else{navigator.clipboard?.writeText(text).then(()=>alert('Copied to clipboard!'));}
}
function newPack(id){const sd=SUPP_DEFS.find(s=>s.id===id);if(!sd)return;if(!S.supplements[id])S.supplements[id]={};S.supplements[id].openedDate=today();S.supplements[id].openingStock=sd.packSize;saveState();render();}
function editStock(id,unit){const current=S.supplements[id]?.openingStock||'';const val=prompt('Enter current stock remaining ('+unit+'):',current);if(val===null)return;const num=parseFloat(val);if(isNaN(num))return;if(!S.supplements[id])S.supplements[id]={};S.supplements[id].openingStock=num;S.supplements[id].openedDate=S.supplements[id].openedDate||today();saveState();render();}
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='connor_dashboard_'+today().replace(/-/g,'')+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}
function importData(input){const file=input.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{try{const parsed=JSON.parse(e.target.result);if(parsed.logs!==undefined||parsed.lifts!==undefined||parsed.recipes!==undefined){S={...S,...parsed};saveState();render();alert('Imported successfully.');}else{alert('Invalid backup file.');}}catch{alert('Could not read file.');}};r.readAsText(file);}
function confirmClear(){if(confirm('Delete ALL data? Cannot be undone.')){S={profile:{...DP},logs:{},lifts:{},sessState:{},recipes:[...DR],customFoods:[],supplements:{},shopTicked:{}};saveState();render();}}
function checkPhase(){const p=S.profile;const t=today();if(p.inseasonDate&&t>=p.inseasonDate&&p.phase!=='inseason'){p.phase='inseason';p.block=PHASES.inseason.block;saveState();}else if(p.preseasonDate&&t>=p.preseasonDate&&p.phase==='offseason'){p.phase='preseason';p.block=PHASES.preseason.block;saveState();}}
function updateFP(){const sel=document.getElementById('fsel');const qty=parseFloat(document.getElementById('fqty')?.value)||100;const el=document.getElementById('fprev');if(!sel||!el)return;const m=fm(sel.value,qty);el.textContent=m.kcal+'kcal · '+m.p+'P · '+m.c+'C · '+m.f+'F';}
function bindEv(){
  const fs=document.getElementById('fsel');const fq=document.getElementById('fqty');
  if(fs){fs.addEventListener('change',updateFP);updateFP();}
  if(fq)fq.addEventListener('input',updateFP);
  const ck=document.getElementById('calc-kg');const cr=document.getElementById('calc-reps');
  if(ck)ck.addEventListener('input',calc1rm);if(cr)cr.addEventListener('input',calc1rm);
  const rr=document.getElementById('rpe-1rm');const rp=document.getElementById('rpe-rpe');
  if(rr)rr.addEventListener('input',calcRPE);if(rp)rp.addEventListener('change',calcRPE);
  STAPLES.forEach(s=>{if(shopSel['s'+s.name]===undefined)shopSel['s'+s.name]=true;});
}
loadState();
checkPhase();
updateHdr();
render();
</script>

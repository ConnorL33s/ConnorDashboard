<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Connor Dashboard">
<meta name="theme-color" content="#0a0a0f">
<title>Connor Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22222f;
  --border:#2a2a3a;--border2:#363650;
  --text:#e8e8f0;--g1:#9090a8;--g2:#505068;--g3:#2a2a3a;
  --blue:#5b8cff;--blue2:#3d6edb;--bdim:#0d1433;
  --mint:#34d399;--mint2:#22a876;--mdim:#082416;
  --red:#f04060;--amber:#f0a030;--white:#ffffff;
  --nav-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overscroll-behavior:none}
.hdr{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top))}
.hdr-logo{display:flex;align-items:center;gap:9px}
.hdr-icon{width:32px;height:32px;background:var(--bdim);border:1px solid var(--blue2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;letter-spacing:.08em;text-transform:uppercase;color:var(--white)}
.hdr-sub{font-size:9px;color:var(--g2);letter-spacing:.1em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.hdr-right{text-align:right}
.hdr-lifts{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--blue);letter-spacing:.04em}
.hdr-wt{font-size:10px;color:var(--g2)}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg2);border-top:1px solid var(--border);display:flex;height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 4px}
.bnav-icon{font-size:20px;line-height:1}
.bnav-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--g2);transition:color .15s}
.bnav-btn.active .bnav-label{color:var(--blue)}
.more-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);display:flex;align-items:flex-end}
.more-panel{background:var(--bg2);border-top:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;padding:16px;padding-bottom:max(20px,env(safe-area-inset-bottom));max-height:80vh;overflow-y:auto}
.more-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.more-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;cursor:pointer}
.more-item:active{border-color:var(--blue)}
.more-item-icon{font-size:22px}
.more-item-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--g1);text-align:center}
.body{padding:12px;padding-bottom:calc(var(--nav-h) + 20px);max-width:860px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:11px}
.card-dark{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.ct{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--g2);margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 10px}
.sl{font-size:9px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;line-height:1;margin-bottom:2px}
.ss-stat{font-size:10px;color:var(--g2)}
.mb{margin-bottom:10px}
.mbh{display:flex;justify-content:space-between;margin-bottom:3px}
.mbl{font-size:10px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.mbv{font-size:11px;font-weight:700;color:var(--text)}
.mbv.over{color:var(--red)}
.mbt{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.mbf{height:100%;border-radius:3px;transition:width .4s ease}
.msm{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:12px}
.mt{background:var(--bg3);border-radius:8px;padding:9px 4px;text-align:center}
.mtv{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;margin-bottom:1px}
.mtv.over{color:var(--red)!important}
.mtl{font-size:9px;color:var(--g2)}
.lb{margin-bottom:14px}
.lbh{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.lbn{font-size:12px;font-weight:600;color:var(--text)}
.lbv{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:var(--blue)}
.lbt{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:2px}
.lbf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g3),var(--blue));transition:width .4s}
.lbm{font-size:9px;color:var(--g3)}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 11px;font-size:14px;font-family:'Barlow',sans-serif;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input[type="date"]{color-scheme:dark}
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.ghost-wrap{position:relative}
.ghost-wrap input{position:relative;z-index:2;background:transparent}
.ghost-txt{position:absolute;top:50%;left:11px;transform:translateY(-50%);font-size:14px;color:var(--g3);z-index:1;pointer-events:none}
.btn{display:block;width:100%;border:none;border-radius:8px;padding:11px 14px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-blue{background:var(--blue);color:#000}
.btn-grey{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-mint{background:var(--mint);color:#000}
.btn-outline{background:none;color:var(--blue);border:1px solid var(--blue);border-radius:8px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;cursor:pointer}
.btn-danger{background:none;color:var(--red);border:1px solid rgba(240,64,96,.3);font-size:12px;padding:8px}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px;width:auto;display:inline-block;border-radius:6px}
.field{margin-bottom:10px}
.fl{font-size:9px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;display:block}
.chk{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;user-select:none;transition:background .15s,border-color .15s}
.chk.done{background:var(--mdim);border-color:var(--mint2)}
.chk-box{font-size:17px;flex-shrink:0}
.chk-lbl{font-size:12px;color:var(--g1)}
.chk.done .chk-lbl{color:var(--mint)}
.mi{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:5px}
.mi-food{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.mi-meta{font-size:10px;color:var(--g2)}
.mi-del{background:none;border:none;color:var(--red);font-size:19px;cursor:pointer;padding:3px 7px;flex-shrink:0}
.ws-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wd{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 2px;text-align:center}
.wd.today{background:#0d1433;border-color:var(--blue)}
.wdn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;color:var(--g2);margin-bottom:3px}
.wd.today .wdn{color:var(--blue)}
.wds{font-size:8px;color:var(--g3);line-height:1.3;margin-bottom:4px}
.wdi{font-size:13px}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase}
.tb{background:var(--bdim);color:var(--blue)}
.tm{background:var(--mdim);color:var(--mint)}
.tg{background:var(--bg4);color:var(--g1)}
.tr{background:#1a0010;color:var(--red)}
.ta{background:#1a1000;color:var(--amber)}
.alert{padding:9px 13px;border-radius:8px;font-size:11px;margin-bottom:9px;border-left:3px solid}
.alert-a{background:#110e00;border-color:var(--amber);color:var(--amber)}
.alert-b{background:#060f22;border-color:var(--blue);color:var(--blue)}
.alert-r{background:#1a0008;border-color:var(--red);color:var(--red)}
.alert-m{background:#061410;border-color:var(--mint);color:var(--mint)}
.spips{display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap}
.spip{height:4px;flex:1;border-radius:2px;background:var(--bg4);min-width:8px;transition:background .3s}
.spip.dp{background:var(--mint)}.spip.cp{background:var(--blue)}
.ex-card{background:var(--bg3);border:1px solid var(--blue2);border-radius:12px;padding:15px;margin-bottom:11px}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--white);letter-spacing:.04em;margin-bottom:2px}
.ex-target{font-size:12px;color:var(--blue);font-weight:600;margin-bottom:2px}
.ex-last{font-size:11px;color:var(--g2);margin-bottom:3px}
.ex-cue{font-size:11px;color:var(--g2);margin-bottom:12px;line-height:1.5;font-style:italic}
.set-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;color:var(--g2);width:32px;flex-shrink:0}
.sdb{width:32px;height:32px;border-radius:7px;border:none;cursor:pointer;font-size:14px;flex-shrink:0;transition:background .15s}
.sdb-on{background:var(--mint);color:#000}.sdb-off{background:var(--bg4);color:var(--g2)}
.wu-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.wu-item:last-child{border-bottom:none}
.wu-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:var(--blue);min-width:18px}
.wu-text{font-size:12px;color:var(--g1);line-height:1.4}
.wu-note{font-size:10px;color:var(--g2);margin-top:2px}
.timer-block{background:var(--bg3);border:1px solid var(--blue2);border-radius:12px;padding:14px;margin-bottom:10px;text-align:center}
.timer-val{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;line-height:1;transition:color .3s}
.timer-bar{width:100%;height:4px;background:var(--bg4);border-radius:2px;margin:10px 0 8px;overflow:hidden}
.timer-fill{height:100%;border-radius:2px;background:var(--blue);transition:width 1s linear}
.rec-item{padding:11px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;margin-bottom:6px}
.rec-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.rec-meta{font-size:10px;color:var(--g2);margin-bottom:6px}
.shop-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer}
.shop-cat{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin:14px 0 6px}
.supp-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.supp-bar-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:6px 0}
.supp-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.week-sess{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.wrow{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:5px}
.lift-entry{font-size:11px;color:var(--g2);padding:3px 0;border-bottom:1px solid var(--border)}
.lift-entry:last-child{border-bottom:none}
.divider{height:1px;background:var(--border);margin:12px 0}
.empty{text-align:center;padding:20px 0;color:var(--g2);font-size:12px}
.scroll-list{max-height:320px;overflow-y:auto}
.io-row{display:flex;gap:7px}.io-row .btn{flex:1}
.sess-done{text-align:center;padding:24px 16px}
.sess-done-icon{font-size:46px;margin-bottom:10px}
.sess-done-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--mint);letter-spacing:.08em;margin-bottom:6px}
.nutr-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px}
.nutr-day{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 3px;text-align:center;cursor:pointer}
.nutr-day.today{border-color:var(--blue)}
.nutr-day-lbl{font-size:9px;color:var(--g2);font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-bottom:3px}
.nutr-day-k{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:900;color:var(--text)}
.nutr-day-p{font-size:9px;color:var(--mint)}
.phase-banner{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:10px;background:var(--bdim);border:1px solid var(--blue2);color:var(--blue);display:flex;align-items:center;gap:8px}
.pb-board{background:var(--bg3);border:1px solid var(--blue2);border-radius:10px;padding:12px;margin-bottom:8px}
.food-result{padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:border-color .15s}
.food-result:active{border-color:var(--blue)}
.food-result-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.food-result-meta{font-size:10px;color:var(--g2)}
.scan-overlay{position:fixed;inset:0;z-index:300;background:#000;display:flex;flex-direction:column}
.scan-overlay video{width:100%;flex:1;object-fit:cover}
.scan-bar{position:absolute;top:50%;left:10%;right:10%;transform:translateY(-50%);height:2px;background:var(--blue);box-shadow:0 0 10px var(--blue)}
.scan-controls{padding:16px;background:rgba(0,0,0,.8);display:flex;gap:10px;justify-content:center}
.chart-canvas{width:100%;height:140px;display:block}
/* Progress chart */
canvas{border-radius:8px}
@media(max-width:480px){.g4{grid-template-columns:repeat(2,1fr)}.sv{font-size:19px}.wds{display:none}.msm{grid-template-columns:repeat(2,1fr)}.nutr-week-grid{gap:2px}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-logo">
      <div class="hdr-icon">🏉</div>
      <div><div class="hdr-title">Connor</div><div class="hdr-sub">Dashboard</div></div>
    </div>
    <div class="hdr-right">
      <div class="hdr-lifts" id="hdr-lifts">S133 / B93 / D133</div>
      <div class="hdr-wt" id="hdr-wt">129kg · Block 1</div>
    </div>
  </div>
</div>
<div class="body" id="app"></div>
<nav class="bnav">
  <button class="bnav-btn active" id="bnav-dash" onclick="go('dash')"><div class="bnav-icon">⚡</div><div class="bnav-label">Home</div></button>
  <button class="bnav-btn" id="bnav-session" onclick="go('session')"><div class="bnav-icon">🏋️</div><div class="bnav-label">Session</div></button>
  <button class="bnav-btn" id="bnav-meals" onclick="go('meals')"><div class="bnav-icon">🍗</div><div class="bnav-label">Meals</div></button>
  <button class="bnav-btn" id="bnav-week" onclick="go('week')"><div class="bnav-icon">📅</div><div class="bnav-label">Week</div></button>
  <button class="bnav-btn" id="bnav-more" onclick="showMore()"><div class="bnav-icon">☰</div><div class="bnav-label">More</div></button>
</nav>
<div id="more-overlay" style="display:none" class="more-overlay" onclick="if(event.target===this)hideMore()">
  <div class="more-panel">
    <div class="ct" style="margin-bottom:0">More</div>
    <div class="more-grid">
      <div class="more-item" onclick="goMore('nutrweek')"><div class="more-item-icon">📊</div><div class="more-item-label">Nutrition</div></div>
      <div class="more-item" onclick="goMore('recipes')"><div class="more-item-icon">📖</div><div class="more-item-label">Recipes</div></div>
      <div class="more-item" onclick="goMore('shop')"><div class="more-item-icon">🛒</div><div class="more-item-label">Shop</div></div>
      <div class="more-item" onclick="goMore('lifts')"><div class="more-item-icon">📈</div><div class="more-item-label">Lifts</div></div>
      <div class="more-item" onclick="goMore('weight')"><div class="more-item-icon">⚖️</div><div class="more-item-label">Weight</div></div>
      <div class="more-item" onclick="goMore('supps')"><div class="more-item-icon">💊</div><div class="more-item-label">Supps</div></div>
      <div class="more-item" onclick="goMore('checks')"><div class="more-item-icon">✅</div><div class="more-item-label">Checks</div></div>
      <div class="more-item" onclick="goMore('measurements')"><div class="more-item-icon">📏</div><div class="more-item-label">Body</div></div>
      <div class="more-item" onclick="goMore('pbs')"><div class="more-item-icon">🏆</div><div class="more-item-label">PBs</div></div>
      <div class="more-item" onclick="goMore('injuries')"><div class="more-item-icon">🩹</div><div class="more-item-label">Niggles</div></div>
      <div class="more-item" onclick="goMore('profile')"><div class="more-item-icon">👤</div><div class="more-item-label">Profile</div></div>
      <div class="more-item" onclick="goMore('data')"><div class="more-item-icon">💾</div><div class="more-item-label">Data</div></div>
    </div>
  </div>
</div>
<div id="scan-overlay" style="display:none" class="scan-overlay">
  <div style="padding:14px;background:rgba(0,0,0,.8);display:flex;align-items:center;gap:10px;padding-top:max(14px,env(safe-area-inset-top))">
    <button onclick="stopScan()" style="background:none;border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer">✕ Cancel</button>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--white);letter-spacing:.08em">SCAN BARCODE</div>
  </div>
  <div style="position:relative;flex:1;overflow:hidden">
    <video id="scan-video" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover"></video>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
      <div style="width:70%;max-width:280px;aspect-ratio:2/1;border:2px solid var(--blue);border-radius:8px;box-shadow:0 0 0 2000px rgba(0,0,0,.5)">
        <div class="scan-bar"></div>
      </div>
    </div>
  </div>
  <div style="padding:14px;background:rgba(0,0,0,.9);text-align:center">
    <div id="scan-status" style="font-size:13px;color:var(--g1)">Point camera at barcode</div>
  </div>
</div>
<script>

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayDi(){const d=new Date().getDay();return d===0?6:d-1;}
function dateDi(ds){const d=new Date(ds+'T12:00:00').getDay();return d===0?6:d-1;}
function getW(){return S.profile.phase==='inseason'?WIS:WOS;}
function isTrain(di){const w=getW()[di];return w&&(w.type==='gym'||w.type==='cardio');}
function dayLog(date){if(!S.logs[date])S.logs[date]={meals:[],checks:{}};if(!S.logs[date].meals)S.logs[date].meals=[];if(!S.logs[date].checks)S.logs[date].checks={};return S.logs[date];}
function allFoods(){const r={...FDB};(S.recipes||[]).forEach(rec=>{r[rec.name]={kcal:rec.portionKcal,p:rec.portionP,c:rec.portionC,f:rec.portionF,isRecipe:true,cat:'Recipes'};});return r;}
function sumMeals(meals){return meals.reduce((a,m)=>({kcal:a.kcal+(m.kcal||0),p:a.p+(m.p||0),c:a.c+(m.c||0),f:a.f+(m.f||0)}),{kcal:0,p:0,c:0,f:0});}
function fm(n,qty=100){const foods=allFoods();const fd=foods[n];if(!fd)return{kcal:0,p:0,c:0,f:0};const m=qty/100;return{kcal:Math.round(fd.kcal*m),p:Math.round(fd.p*m),c:Math.round(fd.c*m),f:Math.round(fd.f*m)};}
function getLast(pk,bd){const dates=Object.keys(S.logs).filter(d=>d<bd).sort().reverse();for(const d of dates){const sk=d+'_'+pk;if(S.sessState[sk]?.phase==='done')return{date:d,ss:S.sessState[sk]};}return null;}
function getLastSets(pk,ei,bd){const l=getLast(pk,bd);if(!l)return null;return l.ss.sets?.[ei]||null;}
function mbar(l,v,t,c){const pc=Math.min((v/t)*100,100);const ov=v>t;return '<div class="mb"><div class="mbh"><span class="mbl">'+l+'</span><span class="mbv '+(ov?'over':'')+'">'+v+'<span style="color:var(--g3)">/'+t+'</span></span></div><div class="mbt"><div class="mbf" style="width:'+pc+'%;background:'+(ov?'var(--red)':c)+'"></div></div></div>';}
function updateHdr(){const p=S.profile;const sq=(S.lifts['Back Squat']?.current)||p.squat1rm;const bp=(S.lifts['Bench Press']?.current)||p.bench1rm;const dl=(S.lifts['Deadlift']?.current)||p.deadlift1rm;document.getElementById('hdr-lifts').textContent='S'+sq+' / B'+bp+' / D'+dl;const we=Object.entries(S.logs).filter(([,v])=>v.weight).sort(([a],[b])=>a.localeCompare(b));const curW=we.length>0?we[we.length-1][1].weight:p.startWeight;document.getElementById('hdr-wt').textContent=curW+'kg · '+p.block;}
function ft(s){const m=Math.floor(s/60);return(m>0?m+':':'')+String(Math.max(s%60,0)).padStart(2,'0');}

// ── TIMER (survives renders) ──────────────────────────────────────────────────
let timerInterval=null,timerLeft=0,timerTotal=0,timerRunning=false;
function startTimer(secs){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  timerLeft=secs;timerTotal=secs;timerRunning=true;
  timerInterval=setInterval(()=>{
    timerLeft=Math.max(timerLeft-1,0);
    updateTimerEl();
    if(timerLeft<=0){clearInterval(timerInterval);timerInterval=null;timerRunning=false;beep();}
  },1000);
  updateTimerEl();
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}timerRunning=false;timerLeft=0;timerTotal=0;updateTimerEl();}
function updateTimerEl(){const el=document.getElementById('td');const fill=document.getElementById('tf');if(el){el.textContent=ft(timerLeft);el.style.color=timerLeft<=10&&timerLeft>0?'var(--red)':'var(--white)';}if(fill)fill.style.width=(timerTotal>0?(timerLeft/timerTotal)*100:0)+'%';}
function beep(){try{const a=new AudioContext();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.5);o.start();o.stop(a.currentTime+0.5);}catch(e){}if(navigator.vibrate)navigator.vibrate([300,100,300]);}
function timerHtml(defaultRest){
  if(!timerRunning&&timerLeft===0)return '<div style="margin-bottom:8px"><button onclick="startTimer('+defaultRest+')" class="btn btn-grey btn-sm">⏱ Start Rest Timer ('+ft(defaultRest)+')</button></div>';
  return '<div class="timer-block" style="margin-bottom:10px"><div id="td" class="timer-val">'+ft(timerLeft)+'</div><div class="timer-bar"><div id="tf" class="timer-fill" style="width:'+(timerTotal>0?(timerLeft/timerTotal)*100:0)+'%"></div></div><div style="display:flex;gap:8px;justify-content:center"><button onclick="stopTimer()" style="background:none;border:1px solid var(--border2);color:var(--g1);border-radius:6px;padding:4px 14px;font-size:12px;cursor:pointer">Stop</button></div></div>';
}

// ── BARCODE SCANNER ───────────────────────────────────────────────────────────
let scanStream=null,scanDetector=null,scanMode='meal',scanRecipeMode=false;
function startScan(mode){
  scanMode=mode||'meal';
  document.getElementById('scan-overlay').style.display='flex';
  document.getElementById('scan-status').textContent='Point camera at barcode';
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}}).then(stream=>{
    scanStream=stream;
    const vid=document.getElementById('scan-video');
    vid.srcObject=stream;
    vid.play();
    // Use BarcodeDetector if available (Chrome/Edge/Android)
    if('BarcodeDetector' in window){
      scanDetector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39']});
      scanLoop();
    } else {
      document.getElementById('scan-status').textContent='Barcode scanning not supported on this browser. Try Chrome on Android.';
    }
  }).catch(()=>{document.getElementById('scan-status').textContent='Camera access denied. Allow camera in Settings → Safari.';});
}
function scanLoop(){
  const vid=document.getElementById('scan-video');
  if(!vid||!scanStream||!scanDetector)return;
  scanDetector.detect(vid).then(barcodes=>{
    if(barcodes.length>0){
      const code=barcodes[0].rawValue;
      stopScan();
      lookupBarcode(code);
    } else {
      requestAnimationFrame(scanLoop);
    }
  }).catch(()=>requestAnimationFrame(scanLoop));
}
function stopScan(){
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  document.getElementById('scan-overlay').style.display='none';
}
function lookupBarcode(code){
  document.getElementById('scan-status').textContent='Looking up '+code+'...';
  fetch('https://world.openfoodfacts.org/api/v0/product/'+code+'.json')
    .then(r=>r.json())
    .then(data=>{
      if(data.status===1&&data.product){
        const p=data.product;
        const n100=p.nutriments||{};
        const name=(p.product_name||p.product_name_en||'Unknown Product').trim();
        const kcal=Math.round(n100['energy-kcal_100g']||n100['energy_100g']/4.184||0);
        const protein=Math.round((n100['proteins_100g']||0)*10)/10;
        const carbs=Math.round((n100['carbohydrates_100g']||0)*10)/10;
        const fat=Math.round((n100['fat_100g']||0)*10)/10;
        showScannedFood(name,kcal,protein,carbs,fat,code);
      } else {
        showScanNotFound(code);
      }
    }).catch(()=>showScanNotFound(code));
}

  const lbars=goals.map(({name,start,target})=>{const cur=(S.lifts[name]?.current)||start;const pc=target>start?Math.min(Math.max(((cur-start)/(target-start))*100,2),100):2;return '<div class="lb"><div class="lbh"><span class="lbn">'+name+'</span><span class="lbv">'+cur+(name==='Weighted Pull-Up'?'kg+':'kg')+'</span></div><div class="lbt"><div class="lbf" style="width:'+Math.max(pc,2)+'%"></div></div><div class="lbm">Target: '+target+(name==='Weighted Pull-Up'?'kg+':'kg')+'</div></div>';}).join('');

function drawWeightChart(){

  if(entries.length<2)return;
  const wts=entries.map(([,v])=>v.weight);
  const mn=Math.min(...wts)-1;const mx=Math.max(...wts)+1;

  canvas.width=W*2;canvas.height=H*2;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(2,2);

  ctx.strokeStyle='#2a2a3a';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad+gH*(i/4);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();}
  // Line
  ctx.strokeStyle='#5b8cff';ctx.lineWidth=2;ctx.beginPath();

function rNutr(){

    dd.map(({ds,tot,tgts,day})=>tot.kcal>0?'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--g1);min-width:30px">'+day+'</span><span style="color:'+(tot.kcal>tgts.kcal?'var(--red)':'var(--text)')+'">'+tot.kcal+'kcal</span><span style="color:'+(tot.p>=tgts.protein?'var(--mint)':'var(--amber)')+'">'+tot.p+'P</span><span style="color:var(--g2)">'+tot.c+'C · '+tot.f+'F</span></div>':'').join('')+

function editRec(i){recipeTab='build';recipeEditId=i;recipeViewId=null;recipeIngredients=(S.recipes[i]?.ingredients||[]).map(ing=>{const m=fm(ing.name,parseFloat(ing.qty)||100);return{name:ing.name,qty:parseFloat(ing.qty)||100,...m};});render();}
function delRec(i){if(confirm('Delete this recipe?')){S.recipes.splice(i,1);saveState();recipeTab='list';recipeEditId=null;render();}}
function logRecFromList(i){const r=S.recipes[i];const dl=dayLog(mealsDate);const m=fm(r.name);dl.meals.push({food:r.name,qty:100,note:'1 portion',slot:'12:30 — Lunch',...m,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});saveState();recipeViewId=null;go('meals');}
function addIng(){const food=document.getElementById('ing-food')?.value;const qty=parseFloat(document.getElementById('ing-qty')?.value)||100;if(!food)return;const m=fm(food,qty);recipeIngredients.push({name:food,qty,...m});render();}
function rmIng(i){recipeIngredients.splice(i,1);render();}
function saveRec(){
  const name=document.getElementById('rec-name')?.value?.trim();if(!name){alert('Please enter a recipe name.');return;}
  const portions=parseInt(document.getElementById('rec-portions')?.value)||5;
  const type=document.getElementById('rec-type')?.value||'Other';
  const method=document.getElementById('rec-method')?.value||'';
  const ingTotal=recipeIngredients.reduce((a,i)=>({kcal:a.kcal+(i.kcal||0),p:a.p+(i.p||0),c:a.c+(i.c||0),f:a.f+(i.f||0)}),{kcal:0,p:0,c:0,f:0});
  const tK=parseFloat(document.getElementById('rec-kcal')?.value)||ingTotal.kcal;
  const tP=parseFloat(document.getElementById('rec-p')?.value)||ingTotal.p;
  const tC=parseFloat(document.getElementById('rec-c')?.value)||ingTotal.c;
  const tF=parseFloat(document.getElementById('rec-f')?.value)||ingTotal.f;
  if(!tK){alert('Please add ingredients or enter total macros.');return;}
  const rec={name,type,portions,method,ingredients:[...recipeIngredients],portionKcal:Math.round(tK/portions),portionP:Math.round(tP/portions),portionC:Math.round(tC/portions),portionF:Math.round(tF/portions)};
  if(recipeEditId!==null)S.recipes[recipeEditId]=rec;else S.recipes.push(rec);
  saveState();recipeTab='list';recipeEditId=null;recipeIngredients=[];render();
}
function tSS(key){if(key.startsWith('s'))shopSel[key]=shopSel[key]===false?true:false;else shopSel[key]=!shopSel[key];render();}
function genShop(){shopGen=true;S.shopTicked={};saveState();render();}
function tickShop(k){if(!S.shopTicked)S.shopTicked={};S.shopTicked[k]=!S.shopTicked[k];saveState();render();}
function clearTicks(){S.shopTicked={};saveState();render();}
function shareList(){
  const recs=S.recipes||[];let text='Connor Dashboard — Shopping List ('+shopDays+' days)\n\n';
  const cats={};
  recs.filter((_,i)=>shopSel['r'+i]).forEach(r=>{if(r.ingredients)r.ingredients.forEach(ing=>{if(!cats['Recipe Ingredients'])cats['Recipe Ingredients']=[];cats['Recipe Ingredients'].push(ing.name+' — '+ing.qty);});});
  STAPLES.forEach(s=>{if(shopSel['s'+s.name]===false)return;if(!cats[s.cat])cats[s.cat]=[];cats[s.cat].push(s.name+' — '+s.packSize+' ('+s.store+')');});
  Object.entries(cats).forEach(([cat,items])=>{text+=cat.toUpperCase()+'\n'+items.map(i=>'• '+i).join('\n')+'\n\n';});
  if(navigator.share){navigator.share({title:'Shopping List',text});}else{navigator.clipboard?.writeText(text).then(()=>alert('Copied!'));}
}
function newPack(id){const sd=SUPPDEFS.find(s=>s.id===id);if(!sd)return;if(!S.supplements[id])S.supplements[id]={};S.supplements[id].openedDate=today();S.supplements[id].openingStock=sd.packSize;saveState();render();}
function editStock(id,unit){const current=S.supplements[id]?.openingStock||'';const val=prompt('Enter current stock remaining ('+unit+'):',current);if(val===null)return;const num=parseFloat(val);if(isNaN(num))return;if(!S.supplements[id])S.supplements[id]={};S.supplements[id].openingStock=num;S.supplements[id].openedDate=S.supplements[id].openedDate||today();saveState();render();}
function saveMeas(){
  const date=document.getElementById('meas-date')?.value||today();
  const MEAS=['Weight','Neck','Chest','Waist','Hips','Left Arm','Right Arm','Left Thigh','Right Thigh'];
  const entry={date};MEAS.forEach(m=>{const val=parseFloat(document.getElementById('meas-'+m.replace(/ /g,'-'))?.value);if(val&&!isNaN(val))entry[m]=val;});
  if(Object.keys(entry).length<=1){alert('Enter at least one measurement.');return;}
  const ex=S.measurements.findIndex(e=>e.date===date);
  if(ex>=0)S.measurements[ex]={...S.measurements[ex],...entry};else S.measurements.push(entry);
  saveState();render();
}
function delMeas(date){if(confirm('Delete?')){S.measurements=S.measurements.filter(e=>e.date!==date);saveState();render();}}
function saveInjury(){const bp=document.getElementById('inj-part')?.value;const sev=parseInt(document.getElementById('inj-sev')?.value)||5;const date=document.getElementById('inj-date')?.value||today();const note=document.getElementById('inj-note')?.value||'';if(!bp)return;if(!S.injuries)S.injuries=[];S.injuries.push({bodyPart:bp,severity:sev,date,note});saveState();render();}
function delInjury(i){if(confirm('Delete?')){S.injuries.splice(i,1);saveState();render();}}
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='connor_dashboard_'+today().replace(/-/g,'')+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}
function importData(input){const file=input.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{try{const parsed=JSON.parse(e.target.result);if(parsed.logs!==undefined||parsed.lifts!==undefined||parsed.recipes!==undefined){S={...S,...parsed};saveState();render();alert('Imported successfully.');}else{alert('Invalid backup file.');}}catch{alert('Could not read file.');}};r.readAsText(file);}
function confirmClear(){if(confirm('Delete ALL data? Cannot be undone.')){S={profile:{...DP},logs:{},lifts:{},sessState:{},recipes:[...DR],supplements:{},shopTicked:{},measurements:[],injuries:[],water:{}};saveState();render();}}
function checkPhase(){const p=S.profile;const t=today();if(p.inseasonDate&&t>=p.inseasonDate&&p.phase!=='inseason'){p.phase='inseason';p.block=PHASES.inseason.block;saveState();}else if(p.preseasonDate&&t>=p.preseasonDate&&p.phase==='offseason'){p.phase='preseason';p.block=PHASES.preseason.block;saveState();}}
function updateFP(){const sel=document.getElementById('fsel');const qty=parseFloat(document.getElementById('fqty')?.value)||100;const el=document.getElementById('fprev');if(!sel||!el)return;const m=fm(sel.value,qty);el.textContent=m.kcal+'kcal · '+m.p+'P · '+m.c+'C · '+m.f+'F';}
function bindEv(){
  const fs=document.getElementById('fsel');const fq=document.getElementById('fqty');
  if(fs){fs.addEventListener('change',updateFP);updateFP();}
  if(fq)fq.addEventListener('input',updateFP);
  const ck=document.getElementById('calc-kg');const cr=document.getElementById('calc-reps');
  if(ck)ck.addEventListener('input',calc1rm);if(cr)cr.addEventListener('input',calc1rm);
  const rr=document.getElementById('rpe-1rm');const rp=document.getElementById('rpe-rpe');
  if(rr)rr.addEventListener('input',calcRPE);if(rp)rp.addEventListener('change',calcRPE);
  if(timerRunning)updateTimerEl();
  STAPLES.forEach(s=>{if(shopSel['s'+s.name]===undefined)shopSel['s'+s.name]=true;});
  // Draw charts after render
  setTimeout(()=>{drawWeightChart();},50);
}
// ── INIT ─────────────────────────────────────────────────────────────────────
loadState();
checkPhase();
updateHdr();
render();
</script>
